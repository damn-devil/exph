ние оси катушки.", "solution": "Дано: наклонная α, катушка m, I, r.\n\nРешение:\n1) mg·sinα − T = ma; T·r = I·ε; a = ε·r\n2) T = I·a/r² → mg·sinα − I·a/r² = ma\na = mg·sinα·r²/(m·r² + I)\n\nОтвет: a = mg·sinα·r²/(m·r² + I)"}, {"num": 13, "desc": "Однородный шар скатывается без скольжения по наклонной плоскости, составляющей угол α с горизонтальной плоскостью. Найти ускорение центра масс шара и значение коэффициента трения качения. Момент инерции шара относительно оси, проходящей через его центр, равенгде m и R – масса и радиус шара, соответственно.", "solution": "Дано: шар m, R, I = 2mR²/5, α.\n\nРешение:\n1) mg·sinα − F_тр = ma; F_тр·R = I·ε; a = ε·R\n2) F_тр = I·a/R² = 2ma/5\n3) mg·sinα − 2ma/5 = ma → a = 5g·sinα/7\n4) μ = F_тр/N = (2ma/5)/(mg·cosα) = 2tgα/7\n\nОтвет: a = 5g·sinα/7; μ_мин = 2tgα/7"}, {"num": 14, "desc": "В установке, показанной на рисунке, известны масса однородного сплошного цилиндра m , его радиус R и массы тел m1 и m2 . Скольжения нити и трения в оси цилиндра нет. Найти угловое ускорение цилиндра и отношение натяженийвертикальных участков нити в процессе движения.", "solution": "Дано: цилиндр m, R; m₁, m₂.\n\nРешение:\n1) T₁−m₁g = m₁a; m₂g−T₂ = m₂a; (T₂−T₁)R = (mR²/2)·ε\n2) T₂−T₁ = ma/2\n3) a = (m₂−m₁)·g/(m₁+m₂+m/2); ε = a/R\n4) T₁/T₂ = m₁(g+a)/[m₂(g−a)]\n\nОтвет: ε = (m₂−m₁)·g/[R(m₁+m₂+m/2)]; T₁/T₂ = m₁(g+a)/[m₂(g−a)]"}, {"num": 15, "desc": "Локомотив массой m начинает двигаться от станции так, что его скорость меняется по закону, где α – постоянная, s – пройденный путь. Найти суммарную работу всех сил, действующих на локомотив за первые t секунд после начала движения.", "solution": "Дано: m, v = α·√s.\n\nРешение:\n1) A = ΔE_к = mv²/2\n2) ds/√s = α·dt → 2√s = α·t → s = α²t²/4\n3) v = α·√s = α²·t/2\n4) A = m·(α²t/2)²/2 = m·α⁴·t²/8\n\nОтвет: A = m·α⁴·t²/8"}, {"num": 16, "desc": "Тело массой m начинают поднимать с поверхности земли под действием силыгде α – положительная постоянная. Найти работу этой силы и приращение потенциальной энергии тела в поле тяжести Земли на первой половине пути подъема h.", "solution": "Дано: m, h, F = 2mg·(1 − y/(2h)).\n\nРешение:\n1) A_F = ∫₀^{h/2} 2mg·(1 − y/(2h))·dy = 2mg·[y − y²/(4h)]₀^{h/2}\n= 2mg·(h/2 − h/16) = 7mgh/8\n2) ΔU = mg·(h/2) = mgh/2\n\nОтвет: A_F = 7mgh/8; ΔU = mgh/2"}, {"num": 17, "desc": "Круглая горизонтальная платформа массой M и радиусом R вращается с угловой скоростью ω1. На краю платформы стоит человек массой m. Найти угловую скорость платформы ω2 , если человек перейдет в центр платформы и остановится там, а также изменение кинетической энергии системы.", "solution": "Дано: M, R, ω₁; человек m на краю → в центр.\n\nРешение:\n1) Закон сохранения момента импульса:\n(MR²/2 + mR²)·ω₁ = (MR²/2)·ω₂\n2) ω₂ = ω₁·(1 + 2m/M)\n3) ΔE = I₂ω₂²/2 − I₁ω₁²/2\n\nОтвет: ω₂ = ω₁·(1 + 2m/M)"}, {"num": 18, "desc": "Пуля массой m , летящая со скоростью v, попадает в деревянный шар массой М, подвешенный на невесомой, нерастяжимой нити, и застревает в нем. На какую высоту h поднимется шар с пулей после столкновения?", "solution": "Дано: пуля m, v; шар M.\n\nРешение:\n1) ЗСИ: mv = (m+M)u → u = mv/(m+M)\n2) ЗСЭ: (m+M)u²/2 = (m+M)gh\nh = u²/(2g) = m²v²/[2g(m+M)²]\n\nОтвет: h = m²v²/[2g(m+M)²]"}, {"num": 19, "desc": "Две одинаковые тележки движутся друг за другом по инерции (без трения) с одной и той же скоростью v0. На задней тележке находится человек массой m . В некоторый момент человек прыгнул в переднюю тележку со скоростью u относительно своей тележки. Имея в виду, что масса каждой тележки равна M , найти скорости, с которыми будут двигаться обе тележки после этого.", "solution": "Дано: тележки M, v₀; человек m; прыжок со скоростью u отн. своей тележки.\n\nРешение:\n1) После прыжка: v₁ — задняя, v₂ — передняя с человеком.\n2) (M+m)v₀ = Mv₁ + m(v₁+u) → v₁ = v₀ − mu/(M+m)\n3) m(v₁+u) + Mv₀ = (m+M)v₂ → v₂ = v₀ + mMu/(M+m)²\n\nОтвет: v₁ = v₀ − mu/(M+m); v₂ = v₀ + mMu/(M+m)²"}, {"num": 20, "desc": "Небольшая шайба массой m без начальной скорости соскальзывает с гладкой горки высотой h и попадает на доску массой M , лежащую y основания горки на гладкой горизонтальной плоскости. Вследствие трения между шайбой и доской шайба тормозится и, начиная с некоторого момента, движется вместе с доской как единое целое. Найти работу силы трения в", "solution": "Дано: шайба m, h; доска M.\n\nРешение:\n1) Перед ударом: v = √(2gh)\n2) ЗСИ: m√(2gh) = (m+M)u → u = m√(2gh)/(m+M)\n3) A_тр = E_кон − E_нач = (m+M)u²/2 − mgh\n= −mMgh/(m+M)\n\nОтвет: A_тр = −mMgh/(m+M)"}, {"num": 21, "desc": "Затухающие колебания точки происходят по закону. Найти: а) амплитуду смещения и скорость точки в момент t= 0; б) моменты времени, когда точка достигает крайних положений.", "solution": "Дано: x = 5·e^{−0,2t}·cos(π·t).\n\nРешение:\n1) x(0) = 5·1·1 = 5\n2) v = dx/dt = 5e^{−0,2t}(−0,2cos(πt) − πsin(πt))\nv(0) = −1\n3) v = 0 → −0,2cos(πt) − πsin(πt) = 0\ntg(πt) = −0,2/π → t_n = n − 0,0637/π ≈ n − 0,0202\n\nОтвет: а) x(0)=5, v(0)=−1; б) t_n ≈ n − 0,0202 (n=0,1,2,…)"}, {"num": 22, "desc": "Определить период малых продольных колебаний тела массой m в системе, показанной на рисунке, если жесткости пружинок равны, а их массы и трение пренебрежимо малы. В положении равновесия можно считать, что пружинки не деформированы.", "solution": "Дано: m, k₁, k₂.\n\nРешение:\n1) Последовательное соединение: 1/k_эфф = 1/k₁ + 1/k₂\nk_эфф = k₁k₂/(k₁+k₂)\n2) T = 2π√(m/k_эфф) = 2π√(m(k₁+k₂)/(k₁k₂))\n\nОтвет: T = 2π√(m(k₁+k₂)/(k₁k₂))"}, {"num": 23, "desc": "Однородный диск радиусом R может вращаться вокруг горизонтальной оси, перпендикулярной его плоскости и проходящей через край диска. Найти период малых колебаний этого диска, если логарифмический декремент затухания равен λ.", "solution": "Дано: диск R, λ — логарифмический декремент.\n\nРешение:\n1) I = mR²/2 + mR² = 3mR²/2 (теорема Штейнера)\n2) ω₀² = mgR/I = 2g/(3R)\n3) T₀ = 2π√(3R/(2g))\n4) С учётом затухания: T = T₀·√(1 + λ²/(4π²))\n\nОтвет: T = 2π√(3R/(2g))·√(1 + λ²/(4π²))"}, {"num": 24, "desc": "Однородный стержень положили на два быстро вращающихся блока. Расстояние между осями блоков l=20 см, коэффициент трения между стержнем и блоками k=0,18. Показать, что стержень будет совершать гармонические колебания. Найти их период.", "solution": "Дано: l = 20 см, k = 0,18.\n\nРешение:\n1) При смещении x: N₁ = mg(½ − x/l), N₂ = mg(½ + x/l)\nF₁ = kN₁, F₂ = kN₂\nF_рез = F₂−F₁ = 2kmg·x/l\n\n2) md²x/dt² = −2kmg·x/l\nd²x/dt² + (2kg/l)·x = 0 — гармонические колебания\n\n3) T = 2π√(l/(2kg)) = 2π√(0,2/(2·0,18·9,8)) ≈ 1,5 с\n\nОтвет: T = 2π√(l/(2kg)) ≈ 1,5 с"}, {"num": 25, "desc": "Определить длину плоской упругой волны, если известно, что смещение точки, отстоящей от источника волн на расстоянии x = 0,1 м в момент времениравно(T и А – период и амплитуда волны, соответственно).", "solution": "Дано: x = 0,1 м, t = T/6, ξ = A/2.\n\nРешение:\n1) ξ(x,t) = A·cos(ωt − kx), ω = 2π/T\n2) A·cos(2π/T·T/6 − k·0,1) = A/2\ncos(π/3 − 0,1k) = ½\n3) π/3 − 0,1k = π/3 или π/3 − 0,1k = −π/3\nk = 0 (не подходит) или k = 20π/3\n4) λ = 2π/k = 2π/(20π/3) = 0,3 м\n\nОтвет: λ = 0,3 м"}, {"num": 26, "desc": "Тонкое полукольцо радиусом 𝑅=20 см заряжено равномерно зарядом 𝑞=0,7 нКл. Найти модуль напряженности электрического поля в центре кривизны этого полукольца.", "solution": "Дано: R = 0,2 м, q = 0,7·10⁻⁹ Кл.\n\nРешение:\n1) dE = k·dq/R², dq = (q/π)·dφ\n2) Из симметрии: E = ∫₀^π (k·q·sinφ·dφ)/(π·R²)\n= kq/(πR²)·[−cosφ]₀^π = 2kq/(πR²)\n3) E = 2·9·10⁹·0,7·10⁻⁹/(π·0,04) ≈ 100 В/м\n\nОтвет: E = 2kq/(πR²) ≈ 100 В/м"}, {"num": 27, "desc": "Найти модуль напряженности поля, созданного бесконечной заряженной нитью с постоянной линейной плотностью заряда λ на расстоянии 𝑎 от нити.", "solution": "Дано: нить λ, расстояние a.\n\nРешение:\nПо теореме Гаусса: E·2πa·h = λ·h/ε₀\nE = λ/(2πε₀·a) = 2kλ/a\n\nОтвет: E = λ/(2πε₀·a)"}, {"num": 28, "desc": "Тонкий диск радиусом 𝑅 заряжен равномерно с поверхностной плотностью σ. Найти модуль напряженности электрического поля на оси диска на высоте ℎ от центра.", "solution": "Дано: диск R, σ, h на оси.\n\nРешение:\n1) dE = k·σ·2πr·dr·h/(r²+h²)^{3/2}\n2) E = 2πkσh·∫₀ᴿ r·dr/(r²+h²)^{3/2}\n= 2πkσ·(1 − h/√(R²+h²))\n\nОтвет: E = 2πkσ·(1 − h/√(R²+h²))"}, {"num": 29, "desc": "Найти потенциал шара радиуса 0,1 м, если на расстоянии 10 м от его поверхности потенциал составляет 20 В.", "solution": "Дано: r_ш = 0,1 м, на r = 10,1 м φ = 20 В.\n\nРешение:\n1) φ(r) = kq/r → q = 20·10,1/(9·10⁹) ≈ 2,244·10⁻⁸ Кл\n2) φ_ш = kq/r_ш = 9·10⁹·2,244·10⁻⁸/0,1 ≈ 2020 В\n\nОтвет: φ ≈ 2020 В"}, {"num": 30, "desc": "Находящийся в вакууме тонкий прямой стержень длиной 2𝑎 заряжен равномерно зарядом 𝑞. Найти модуль напряженности электрического поля как функцию расстояния 𝑟 от центра стержня до точки прямой: а) пер-перпендикулярной к стержню и проходящей через его центр; б) совпадающей с осью стержня, если 𝑟≫𝑎.", "solution": "Дано: стержень 2a, q, расстояние r.\n\nРешение:\nа) На перпендикуляре через центр:\nE = ∫_{-a}^{a} k·λ·r·dx/(r²+x²)^{3/2} = k·q/(r·√(r²+a²))\n\nб) На оси при r≫a: E ≈ kq/r²\n\nОтвет: а) E = kq/(r·√(r²+a²)); б) E ≈ kq/r²"}, {"num": 31, "desc": "Бесконечный цилиндр радиусом 𝑅 имеет заряд, объемная плотность которого зависит от расстояния 𝑟 до его оси как, где ρ0 – постоянная. Найти модуль напряженности электрического поля внутри и вне цилиндра. Вычислить модуль напряженности поля на поверхности цилиндра.", "solution": "Дано: цилиндр R, ρ = ρ₀·r/R.\n\nРешение:\n1) Внутри (r<R): q = ∫₀ʳ ρ₀·r'·2πr'·l·dr'/R = 2πρ₀lr³/(3R)\nE·2πrl = q/ε₀ → E_внутр = ρ₀·r²/(3Rε₀)\n\n2) Снаружи (r>R): Q = 2πρ₀lR²/3\nE_вне = ρ₀·R²/(3ε₀·r)\n\n3) На поверхности: E_пов = ρ₀·R/(3ε₀)\n\nОтвет: E = ρ₀·r²/(3Rε₀) при r<R; E = ρ₀·R²/(3ε₀r) при r>R"}, {"num": 32, "desc": "Потенциал поля внутри заряженного шара зависит только от расстояния до его центра как φ=𝑎𝑟2+𝑏, где 𝑎 и 𝑏 – постоянные. Найти распределение объемного заряда ρ(𝑟) внутри шара.", "solution": "Дано: φ(r) = a·r² + b внутри шара.\n\nРешение:\n1) E = −dφ/dr = −2a·r\n2) В сферических координатах: divE = (1/r²)·d(r²·E)/dr\nr²·E = −2a·r³, d(r²·E)/dr = −6a·r²\ndivE = −6a\n3) ρ = ε₀·divE = −6a·ε₀ = const\n\nОтвет: ρ = −6a·ε₀ — заряд распределён равномерно"}], "mapping": {"1_0": 0, "1_1": 25, "1_2": 37, "2_0": 1, "2_1": 26, "2_2": 38, "3_0": 2, "3_1": 26, "3_2": 39, "4_0": 3, "4_1": 27, "4_2": 40, "5_0": 4, "5_1": 28, "5_2": 41, "6_0": 6, "6_1": 29, "6_2": 41, "7_0": 7, "7_1": 30, "7_2": 42, "8_0": 9, "8_1": 31, "8_2": 52, "9_0": 10, "9_1": 32, "9_2": 52, "10_0": 11, "10_1": 34, "10_2": 53, "11_0": 12, "11_1": 35, "11_2": 55, "12_0": 13, "12_1": 36, "12_2": 56, "13_0": 14, "13_1": 63, "13_2": 43, "14_0": 16, "14_1": 61, "14_2": 58, "15_0": 17, "15_1": 65, "15_2": 44, "16_0": 18, "16_1": 59, "16_2": 45, "17_0": 20, "17_1": 60, "17_2": 46, "18_0": 21, "18_1": 61, "18_2": 47, "19_0": 22, "19_1": 62, "19_2": 48, "20_0": 24, "20_1": 63, "20_2": 49, "21_0": 23, "21_1": 64, "21_2": 44, "22_0": 23, "22_1": 65, "22_2": 50, "23_0": 1, "23_1": 66, "23_2": 51, "24_0": 3, "24_1": 26, "24_2": 38, "25_0": 6, "25_1": 26, "25_2": 39, "26_0": 9, "26_1": 27, "26_2": 45, "27_0": 8, "27_1": 28, "27_2": 39, "28_0": 14, "28_1": 29, "28_2": 41, "29_0": 17, "29_1": 31, "29_2": 43, "30_0": 20, "30_1": 32, "30_2": 55, "31_0": 22, "31_1": 34, "31_2": 57, "32_0": 15, "32_1": 36, "32_2": 54}};

function mq(text,q){
  if(!q)return true;
  if(!text)return false;
  var t=text.toLowerCase(),w=q.toLowerCase().trim();
  if(!w)return true;
  var queryWords=w.split(/\s+/).filter(function(x){return x});
  if(!queryWords.length)return true;
  var textWords=words(t);
  if(!textWords.length)return false;
  return queryWords.every(function(qw){
    if(qw.length<2)return true;
    if(t.includes(qw))return true;
    var qn=norm(qw);
    if(qn.length<3)return /[а-яёa-z]/i.test(qw) || false;
    for(var i=0;i<textWords.length;i++){
      var tw=textWords[i];
      if(tw.length<3)continue;
      if(tw.includes(qw))return true;
      if(qw.includes(tw))return true;
      var tn=norm(tw);
      if(tn.length<3)continue;
      if(tn.includes(qn)||qn.includes(tn))return true;
      if(tw.startsWith(qw)||qw.startsWith(tw))return true;
      if(qn.length>=4&&tn.length>=4){
        var minLen=Math.min(qn.length,tn.length);
        var diff=minLen<6?1:2;
        if(qn.slice(0,minLen-diff)===tn.slice(0,minLen-diff))return true;
      }
    }
    return false;
  });
}

function hl(text,q){
  if(!q||!text)return esc(text);
  var w=q.trim();
  if(!w)return esc(text);
  var low=text.toLowerCase(),lw=w.toLowerCase();
  var parts=[],last=0;
  while(true){
    var idx=low.indexOf(lw,last);
    if(idx<0)break;
    parts.push(esc(text.slice(last,idx)));
    parts.push('<span class="hl">'+esc(text.slice(idx,idx+w.length))+'</span>');
    last=idx+w.length;
  }
  parts.push(esc(text.slice(last)));
  return parts.join('');
}

function br(t){return t.replace(/\n/g,"<br>")}

function renderSol(txt){return txt.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")}

function truncate(s,max){
  if(!s||s.length<=max)return s||'';
  return s.slice(0,max)+'...';
}

function renderTickets(f){
  var el=$("#ticketsList"),q=f||"",h="<h1>Экзаменационные билеты</h1>",c=0;
  DATA.tickets.forEach(function(t){
    if(q&&!mq(JSON.stringify(t)+(DATA.tasks[t.num-1]?JSON.stringify(DATA.tasks[t.num-1]):""),q))return;
    c++;
    var summary=t.questions.map(function(qt){return truncate(qt,50)}).join("; ");
    var ds=q?esc(summary):esc(summary);
    h+='<div class="card"><div class="card-hd" onclick="tc(this)"><div style="flex:1"><div class="tnum">Билет №'+t.num+'</div><div class="card-summary">'+ds+'</div></div><span class="arw">▼</span></div><div class="card-bd">';
    t.questions.forEach(function(qt,i){
      var a=DATA.mapping[t.num+"_"+i],ans=a!==undefined?DATA.answers[a]:null;
      var dq=q?hl(qt,q):esc(qt);
      h+='<div class="q-item"><div class="q-title"><span class="badge">'+(i+1)+'</span>'+dq+'</div>';
      if(ans){var da=q?hl(ans.answer,q):esc(ans.answer);h+='<div class="q-ans">'+br(da)+'</div>'}
      h+='</div>';
    });
    var task=DATA.tasks.filter(function(x){return x.num===t.num})[0];
    if(task){
      var dt=q?hl(truncate(task.desc,80),q):esc(task.desc);
      h+='<div class="task-box"><h3 onclick="toggleSol(this)">Задача №'+t.num+' ▼</h3><div class="desc">'+dt+'</div>';
      if(task.solution){
        var ds2=renderSol(esc(task.solution));
        h+='<div class="solution">'+br(ds2)+'</div>';
      }
      h+='</div>';
    }
    h+='</div></div>';
  });
  if(!c)h+='<div style="text-align:center;padding:50px 20px;color:var(--secondary);font-size:14px">Ничего не найдено</div>';
  el.innerHTML=h;
}

function renderCalc(cat){
  var g=C[cat],el=$("#calcList");
  if(!g){el.innerHTML='<div style="text-align:center;padding:50px 20px;color:var(--secondary)">Нет данных</div>';return}
  var h='<div class="calc-card"><h3>Введите известные величины</h3>';
  var grp={};g.vars.forEach(function(v){if(!grp[v.g])grp[v.g]=[];grp[v.g].push(v)});
  Object.keys(grp).forEach(function(gname){
    h+='<div class="calc-grp">'+gname+'</div>';
    grp[gname].forEach(function(v){h+='<div class="calc-row"><label>'+v.l+'</label><input id="ci-'+v.k+'" type="number" step="any" placeholder="—"><span class="cu">'+v.u+'</span></div>'});
  });
  h+='<button class="calc-btn" onclick="doCalc(\''+cat+'\')">Решить</button><div class="calc-res" id="cr-'+cat+'"></div></div>';
  el.innerHTML=h;
}

function doCalc(cat){
  var g=C[cat];if(!g)return;
  var d={},allFilled=true;
  g.vars.forEach(function(v){
    var el=document.getElementById("ci-"+v.k);
    var num=parseFloat(el.value);
    if(!isNaN(num)&&el.value.trim()!==""){d[v.k]=num;el.style.borderColor=""}
    else{el.style.borderColor="rgba(255,59,48,.4)"}
  });
  var filled=Object.keys(d).length;
  if(filled<2){alert("Введите хотя бы 2 величины");return}
  var h='',found=0;
  g.f.forEach(function(fo){
    var miss=fo.in.filter(function(x){return d[x]===undefined});
    if(miss.length!==0)return;
    var outKey=fo.out;
    if(d[outKey]!==undefined)return;
    try{
      var r=fo.fn(d);
      found++;
      var ol=C[cat].vars.filter(function(x){return x.k===outKey})[0];
      h+='<div class="calc-fr"><div class="ft">'+fo.tt+'</div><div class="ff">'+fo.ff+'</div>';
      fo.in.forEach(function(kk){h+='<div class="fs">'+C[cat].vars.filter(function(x){return x.k===kk})[0].l+' = '+d[kk]+' '+C[cat].vars.filter(function(x){return x.k===kk})[0].u+'</div>'});
      r.st.forEach(function(s){h+='<div class="fs">'+s+'</div>'});
      h+='<div class="fa">'+(ol?ol.l:outKey)+' = '+r.an+'</div></div>';
    }catch(e){}
  });
  if(!found)h='<div class="calc-got">С формулами не найдено. Введите другие величины.</div>';
  var el=document.getElementById("cr-"+cat);
  el.innerHTML=h;el.classList.add("show");
}

function selCat(el,cat){
  document.querySelectorAll(".calc-cat").forEach(function(c){c.classList.remove("act")});
  el.classList.add("act");renderCalc(cat);
}

}
function clearSearch(){
  $("#sInp").value="";
  onSearch("");

}
function onSearch(v){
  clearTimeout(timer);
  timer=setTimeout(function(){
    var act=document.querySelector(".view.active");

    if(act.id==="vTickets")renderTickets(v);
    else if(act.id==="vTasks")renderTasks(v);
    else if(act.id==="vTheory")renderTheory(v);
    else renderCalc("");
  },100);
}
