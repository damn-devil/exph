<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Физика — Экзамен 2 семестр</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2f2f5;--card:#fff;--accent:#FF8C00;--accent2:#E67E22;--text:#1c1c1e;--secondary:#8e8e93;--border:#e5e5ea;--radius:14px;--sol-bg:#f0f5f0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
.view{display:none;padding:12px 12px 80px;max-width:800px;width:100%;margin:0 auto;min-height:calc(100vh - 100px)}
.view.active{display:block}
h1{font-size:22px;font-weight:700;margin:4px 0 12px}
h2{font-size:15px;font-weight:600;margin:0}
.card{background:var(--card);border-radius:var(--radius);padding:0;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.card-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px;user-select:none;padding:12px}
.card-hd .arw{font-size:11px;color:var(--secondary);transition:transform .25s;flex-shrink:0}
.card-hd .arw.op{transform:rotate(180deg)}
.card-bd{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.card-bd.op{display:block}
.q-item{padding:8px 10px;background:#f8f8fa;border-radius:10px;margin-bottom:6px}
.q-item:last-child{margin-bottom:0}
.q-title{font-size:13.5px;font-weight:500;margin-bottom:4px;line-height:1.4}
.q-title .badge{display:inline-block;background:var(--accent2);color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;margin-right:4px;font-weight:600;vertical-align:middle}
.q-ans{font-size:13px;color:#3a3a3c;line-height:1.6;margin-top:4px;padding-top:4px;border-top:1px dashed #ddd;text-align:left;white-space:pre-wrap}
.task-box{background:#eef3ff;border:1px solid #d6e4ff;border-radius:10px;padding:8px 10px}
.task-box h3{font-size:13px;color:var(--accent);margin-bottom:4px;cursor:pointer;user-select:none}
.task-box .desc{font-size:13px;color:#3a3a3c;line-height:1.55;margin-bottom:2px}
.solution{display:none;margin-top:6px;padding:10px;background:var(--sol-bg);border-radius:8px;font-size:13px;line-height:1.65;color:#2c3e2c;white-space:pre-wrap}
.solution.op{display:block}
.tnum{font-size:11px;color:var(--secondary);font-weight:500;margin-bottom:2px}
.card-summary{font-size:12px;color:var(--secondary);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nav-outer{position:fixed;bottom:10px;left:0;right:0;z-index:100;display:flex;justify-content:center;pointer-events:none}
.nav-wrap{background:rgba(255,255,255,.45);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:40px;box-shadow:0 4px 24px rgba(0,0,0,.06);padding:8px 10px;width:calc(100% - 24px);max-width:520px;pointer-events:auto;border:0.5px solid rgba(255,255,255,.25)}
.nav{display:flex;gap:4px}
.nav-swrap{display:none;flex:1;min-width:0}
.nav-srch .nav-swrap{display:flex}
.nav-sinp{display:flex;flex:1;align-items:center;background:rgba(118,118,128,.1);border-radius:30px;padding:0 4px 0 14px;min-width:0}
.nav-sinp:focus-within{background:rgba(118,118,128,.18)}
.nav-inp{flex:1;padding:9px 0;border:none;font-size:15px;background:transparent;color:var(--text);outline:none;min-width:0;font-weight:400}
.nav-inp::placeholder{color:var(--secondary);font-weight:400}
.nav-clear{flex-shrink:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--secondary);cursor:pointer;border-radius:50%;transition:background .2s;user-select:none}
.nav-clear:active{background:rgba(118,118,128,.2)}
.nav-it{text-align:center;cursor:pointer;padding:8px 12px;color:var(--secondary);font-size:12px;font-weight:600;border-radius:30px;transition:width .3s ease,padding .3s ease,opacity .25s ease,transform .25s ease;white-space:nowrap;user-select:none;display:flex;flex-direction:column;align-items:center;gap:1px;overflow:hidden;min-width:0}
.nav-it.act{background:var(--accent);color:#fff}
.nav-it-desc{font-size:9px;opacity:.55;display:block;margin-top:0;line-height:1;transition:opacity .25s ease}
.nav-sbtn{flex-shrink:0;justify-content:center;padding:8px 10px;font-size:18px;line-height:1;gap:0}
.nav-srch .nav-it{width:0;padding:8px 0;opacity:0;transform:translateY(-6px) scale(.8);pointer-events:none}
.nav-srch .nav-it-desc{opacity:0}
.nav-srch .nav-sbtn{display:none}
.hl{background:#ffd60a;color:#000;padding:0 2px;border-radius:2px}
.thy-list .q-item{cursor:pointer}
.thy-list .q-item .q-title{color:var(--accent2)}
.thy-list .q-item .q-ans{display:none}
.thy-list .q-item.op .q-ans{display:block}
.show-btn{display:inline-block;padding:3px 10px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;cursor:pointer;user-select:none;margin-top:4px}
.calc-cats{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.calc-cat{padding:6px 14px;border:1.5px solid var(--accent);border-radius:20px;background:transparent;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;user-select:none}
.calc-cat.act{background:var(--accent);color:#fff}
.calc-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.calc-card h3{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--accent)}
.calc-grp{font-size:11px;font-weight:600;color:var(--secondary);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px;padding-top:6px;border-top:1px solid var(--border)}
.calc-grp:first-of-type{border-top:none;margin-top:0;padding-top:0}
.calc-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.calc-row label{font-size:14px;min-width:38px;font-weight:500;color:var(--text)}
.calc-row input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:var(--bg);color:var(--text);text-align:right;outline:none;min-width:0;width:0;font-weight:500}
.calc-row input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,140,0,.15)}
.calc-row .cu{font-size:12px;color:var(--secondary);min-width:34px;font-weight:500}
.calc-btn{width:100%;padding:12px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s}
.calc-btn:active{opacity:.7}
.calc-res{display:none;margin-top:12px}
.calc-res.show{display:block}
.calc-got{font-size:13px;color:var(--secondary);text-align:center;padding:10px;font-weight:500}
.calc-fr{background:var(--sol-bg);border-radius:10px;padding:10px;margin-bottom:6px}
.calc-fr .ft{font-size:14px;font-weight:600;margin-bottom:2px}
.calc-fr .ff{font-size:15px;color:var(--accent);font-weight:600;margin-bottom:4px}
.calc-fr .fs{padding-left:10px;border-left:2px solid var(--accent);margin:1px 0;font-size:13px;line-height:1.6}
.calc-fr .fa{font-size:15px;font-weight:700;color:var(--accent);margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}

@media(prefers-color-scheme:dark){
:root{--bg:#000;--card:#111;--text:#f5f5f7;--secondary:#98989d;--border:#222;--sol-bg:#0a1a0a}
.q-item{background:#1a1a1a;border:1px solid #222}
.q-ans{color:#c7c7cc!important;border-top-color:#222!important}
.task-box{background:#0d1a2e;border-color:#1a2a4a}
.task-box .desc{color:#c7c7cc!important}
.solution{color:#b8d4b8!important}
.hl{background:#594d00;color:#ffd60a}
.nav-wrap{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.12)}
.calc-row input{background:#1a1a1a;border-color:#333}
.calc-fr{background:#0a1a0a}
}
</style>
</head>
<body>

<div id="vTickets" class="view active">
<div id="ticketsList"></div>
</div>

<div id="vTasks" class="view">
<div id="tasksList"></div>
</div>

<div id="vTheory" class="view">
<div id="theoryList" class="thy-list"></div>
</div>

<div id="vCalc" class="view">
<div class="calc-cats" id="calcCats"></div>
<div id="calcList"></div>
</div>

<div class="nav-outer">
<div class="nav-wrap">
<div class="nav">
<div class="nav-swrap" id="sWrap"><div class="nav-sinp">
<input class="nav-inp" id="sInp" type="search" placeholder="Поиск" autocomplete="off" oninput="onSearch(this.value)">
<span class="nav-clear" id="sClear" onclick="clearSearch()">✕</span>
</div></div>
<div class="nav-it nav-sbtn" id="sBtn" onclick="openSearch()">🔍<span class="nav-it-desc">поиск</span></div>
<div class="nav-it nav-tab act" onclick="showView('tickets')">Билеты<span class="nav-it-desc">вопросы+задачи</span></div>
<div class="nav-it nav-tab" onclick="showView('tasks')">Задачи<span class="nav-it-desc">все решения</span></div>
<div class="nav-it nav-tab" onclick="showView('theory')">Теория<span class="nav-it-desc">67 ответов</span></div>
<div class="nav-it nav-tab" onclick="showView('calc')">Калькулятор<span class="nav-it-desc">решатель формул</span></div>
</div>
</div>
</div>

<script>
var DATA = {"tickets": [{"num": 1, "questions": ["Механическое движение и механическая система. Материальная точка. Твёрдое тело. Система отсчета. Число степеней свободы механической системы.", "Общие сведения о колебаниях. Уравнение свободных колебаний под действием квазиупругой силы и его общее решение.", "Электрический заряд и его свойства. Закон сохранения электрического заряда. Закон Кулона. Принцип суперпозиции сил."], "task": "Задача № 1."}, {"num": 2, "questions": ["Кинематика материальной точки. Траектория, перемещение и путь.", "Гармонический осциллятор. Энергия гармонического осциллятора.", "Электростатическое поле. Вектор напряженности электрического поля. Принцип суперпозиции полей."], "task": "Задача № 2."}, {"num": 3, "questions": ["Скорость и ускорение. Вычисление пройденного пути.", "Сложение гармонических колебаний.", "Напряженность электростатического поля точечного заряда и системы зарядов. Поток векторного поля через поверхность."], "task": "Задача № 3."}, {"num": 4, "questions": ["Тангенциальное и нормальное ускорения.", "Физический и математический маятники (малые колебания без затухания).", "Теорема Гаусса для поля векторав вакууме в интегральной и дифференциальной формах."], "task": "Задача № 4."}, {"num": 5, "questions": ["Кинематика вращательного движения твёрдого тела. Угловая скорость и угловое ускорение.", "Затухающие колебания. Динамическое и кинематическое уравнения затухающих колебаний. Коэффициент затухания. Логарифмический декремент затухания.", "Потенциал электростатического поля точечного заряда и системы зарядов."], "task": "Задача № 5."}, {"num": 6, "questions": ["Причины изменения скорости тела. Первый закон Ньютона. Инерциальные системы отсчета.", "Вынужденные колебания. Динамическое и кинематическое уравнения вынужденных колебаний.", "Связь потенциала и напряженности электростатического поля."], "task": "Задача № 6."}, {"num": 7, "questions": ["Масса и импульс. Второй закон Ньютона. Уравнение движения материальной точки в инерциальной системе отсчета.", "Явление резонанса. Амплитудно-резонансные кривые.", "Циркуляция вектора напряженностиэлектростатического поля. Теорема о циркуляции векторав интегральной и дифференциальной формах."], "task": "Задача № 7."}, {"num": 8, "questions": ["Состояние механической системы. Сохраняющиеся величины. Силы внутренние и внешние. Замкнутая система.", "Основные характеристики свойств упругих сред. Распространение волн в упругой среде. Продольные и поперечные волны.", "Проводники в электростатическом поле. Электростатическая индукция."], "task": "Задача № 8."}, {"num": 9, "questions": ["Импульс системы. Законы изменения и сохранения импульса системы.", "Фронт волны и волновая поверхность. Плоские, сферические и цилиндрические волны. Фазовая скорость волны. Длина волны.", "Напряженность и потенциал электростатического поля в проводнике и вблизи его поверхности."], "task": "Задача № 9."}, {"num": 10, "questions": ["Центр масс. Уравнение движения центра масс. Система центра масс.", "Связь скорости плоской волны с характеристиками упругой среды.", "Условия стационарного распределения заряда в проводнике."], "task": "Задача № 10."}, {"num": 11, "questions": ["Работа и мощность силы. Кинетическая энергия частицы и закон ее изменения.", "Энергия и плотность энергии упругой волны.", "Плотность и сила тока. Основы теории Друде классической электропроводности металлов."], "task": "Задача № 11."}, {"num": 12, "questions": ["Понятие силового поля. Консервативные силы. Потенциальная энергия частицы в силовом поле. Связь между потенциальной энергией и силой поля.", "Поток и плотность потока энергии. Вектор Умова.", "Уравнение непрерывности как выражение закона сохранения заряда в дифференциальной форме. Условие стационарности электрического тока."], "task": "Задача № 12."}, {"num": 13, "questions": ["Полная механическая энергия частицы в силовом поле. Законы ее изменения и сохранения.", "Распределение Максвелла-Больцмана.", "Электрическое поле диполя в дальней зоне."], "task": "Задача № 13."}, {"num": 14, "questions": ["Момент импульса частицы и момент силы относительно некоторой точки. Уравнение моментов.", "Средняя, среднеквадратичная и наиболее вероятная скорости молекул.", "Закон Джоуля – Ленца в локальной (дифференциальной) форме."], "task": "Задача № 14."}, {"num": 15, "questions": ["Момент импульса системы. Законы изменения и сохранения момента импульса системы.", "Энтропия системы. Закон возрастания энтропии.", "Момент сил, действующих на диполь в электрическом поле. Потенциальная энергия диполя в электростатическом поле."], "task": "Задача № 15."}, {"num": 16, "questions": ["Число степеней свободы твёрдого тела. Уравнения движения твёрдого тела.", "Термодинамический и статический методы исследования. Понятие функции распределения (плотности вероятности) случайной величины.", "Связанные и сторонние заряды. Полярные и неполярные молекулы. Явление поляризации диэлектрика и его механизмы."], "task": "Задача № 16."}, {"num": 17, "questions": ["Момент инерции тела относительно оси. Теорема Штейнера.", "Распределение молекул идеального газа по абсолютным значениям скорости (распределение Максвелла).", "Вектор поляризации. Электрическое поле внутри изотропного диэлектрика."], "task": "Задача № 17."}, {"num": 18, "questions": ["Уравнение динамики твёрдого тела, вращающегося вокруг неподвижной оси.", "Средняя, среднеквадратичная и наиболее вероятная скорости молекул.", "Диэлектрическая восприимчивость. Теорема Гаусса для поля вектора."], "task": "Задача № 18."}, {"num": 19, "questions": ["Кинетическая энергия вращающегося твёрдого тела. Работа внешних сил при вращении твёрдого тела.", "Распределение молекул идеального газа по координатам во внешнем поле (распределение Больцмана).", "Вектор электрического смещения. Теорема Гаусса для поля вектора электрического смещения. Диэлектрическая проницаемость."], "task": "Задача № 19."}, {"num": 20, "questions": ["Гироскоп. Гироскопический эффект.", "Распределение Максвелла-Больцмана.", "Условия на границе раздела двух диэлектриков для векторови."], "task": "Задача № 20."}, {"num": 21, "questions": ["Кинетическая энергия твердого тела при плоском движении.", "Обратимые и необратимые процессы. Второй закон термодинамики.", "Момент сил, действующих на диполь в электростатическом поле. Потенциальная энергия диполя в электростатическом поле."], "task": "Задача № 21."}, {"num": 22, "questions": ["Кинетическая энергия твердого тела при плоском движении.", "Энтропия системы. Закон возрастания энтропии.", "Сегнетоэлектрики и их доменная структура. Нелинейный характер поляризации сегнетоэлектрика."], "task": "Задача № 22."}, {"num": 23, "questions": ["Кинематика материальной точки. Траектория, перемещение и путь.", "Статистический вес макросостояния. Статистический смысл энтропии.", "Диэлектрический гистерезис."], "task": "Задача № 23."}, {"num": 24, "questions": ["Тангенциальное и нормальное ускорения.", "Гармонический осциллятор. Энергия гармонического осциллятора.", "Электростатическое поле. Вектор напряженности электрического поля. Принцип суперпозиции полей."], "task": "Задача № 24."}, {"num": 25, "questions": ["Причины изменения скорости тела. Первый закон Ньютона. Инерциальные системы отсчета.", "Сложение гармонических колебаний.", "Напряженность электростатического поля точечного заряда и системы зарядов. Поток векторного поля через поверхность."], "task": "Задача № 25."}, {"num": 26, "questions": ["Состояние механической системы. Сохраняющиеся величины. Силы внутренние и внешние. Замкнутая система.", "Физический и математический маятники (малые колебания без затухания).", "Связанные и сторонние заряды. Полярные и неполярные молекулы. Явление поляризации диэлектрика и его механизмы."], "task": "Задача № 26."}, {"num": 27, "questions": ["Принцип относительности Галилея. Преобразования Галилея.", "Затухающие колебания. Динамическое и кинематическое уравнения затухающих колебаний. Коэффициент затухания. Логарифмический декремент затухания.", "Напряженность электростатического поля точечного заряда и системы зарядов. Поток векторного поля через поверхность."], "task": "Задача № 27."}, {"num": 28, "questions": ["Полная механическая энергия частицы в силовом поле. Законы ее изменения и сохранения.", "Вынужденные колебания. Динамическое и кинематическое уравнения вынужденных колебаний.", "Потенциал электростатического поля точечного заряда и системы зарядов."], "task": "Задача № 28."}, {"num": 29, "questions": ["Момент импульса системы. Законы изменения и сохранения момента импульса системы.", "Основные характеристики свойств упругих сред. Распространение волн в упругой среде. Продольные и поперечные волны.", "Электрическое поле диполя в дальней зоне."], "task": "Задача № 29."}, {"num": 30, "questions": ["Момент инерции тела относительно оси. Теорема Штейнера.", "Фронт волны и волновая поверхность. Плоские, сферические и цилиндрические волны. Фазовая скорость волны. Длина волны.", "Плотность и сила тока. Основы теории Друде классической электропроводности металлов."], "task": "Задача № 30."}, {"num": 31, "questions": ["Кинетическая энергия вращающегося твёрдого тела. Работа внешних сил при вращении твёрдого тела.", "Связь скорости плоской волны с характеристиками упругой среды.", "Закон Ома в интегральной и локальной (дифференциальной) форме."], "task": "Задача № 31."}, {"num": 32, "questions": ["Механическая энергия системы частиц. Законы изменения и сохранения механической энергии системы.", "Поток и плотность потока энергии. Вектор Умова.", "Электроемкость уединенного проводника. Энергия электрического поля и ее объемная плотность."], "task": "Задача № 32."}], "answers": [{"num": 1, "title": "Вопрос 1. Механическое движение и механическая система. Материальная точка. Твёрдое тело. Система отсчета. Число степеней свободы механической системы.", "answer": "Механическое движение — изменение положения тела или его частей относительно других тел с течением времени. Механическая система — совокупность материальных точек (тел), рассматриваемых как единое целое и взаимодействующих друг с другом и/или с внешними телами.\nМатериальная точка — тело, размерами и формой которого можно пренебречь в условиях данной задачи; вся масса тела считается сосредоточенной в одной точке. Твёрдое тело (абсолютно твёрдое) — система материальных точек, расстояния между любыми двумя точками которой не изменяются в процессе движения.\nСистема отсчёта — совокупность тела отсчёта, связанной с ним системы координат и прибора для измерения времени, относительно которых рассматривается движение остальных тел.\nЧисло степеней свободы механической системы — минимальное количество независимых величин (координат), полностью определяющих положение системы в пространстве. Свободная материальная точка имеет 3 степени свободы (x, y, z); система из N свободных точек — 3N; каждая наложенная голономная связь уменьшает число степеней свободы на единицу. Абсолютно твёрдое тело имеет 6 степеней свободы: 3 координаты центра масс и 3 угла поворота относительно центра масс."}, {"num": 2, "title": "Вопрос 2. Кинематика материальной точки. Траектория, перемещение и путь.", "answer": "Кинематика — раздел механики, изучающий движение тел без рассмотрения причин, вызывающих это движение. Положение точки в пространстве в момент времени t задаётся радиус-вектором r(t), проведённым из начала координат в данную точку.\nТраектория — линия, которую описывает движущаяся точка в пространстве. Путь Δs — скалярная неотрицательная величина, равная длине участка траектории, пройденного точкой за рассматриваемый промежуток времени; путь не убывает с течением времени. Перемещение Δr = r(t₂) − r(t₁) — вектор, соединяющий начальное и конечное положения точки за этот промежуток времени. При прямолинейном движении в одном направлении модуль перемещения равен пройденному пути; в общем случае |Δr| ≤ Δs."}, {"num": 3, "title": "Вопрос 3. Скорость и ускорение. Вычисление пройденного пути.", "answer": "Скорость v = dr/dt — векторная величина, равная производной радиус-вектора точки по времени; вектор скорости направлен по касательной к траектории в сторону движения. Модуль скорости равен производной пути по времени: v = ds/dt.\nУскорение a = dv/dt = d²r/dt² — векторная величина, характеризующая быстроту изменения вектора скорости (по модулю и по направлению).\nПройденный путь за промежуток времени от t₁ до t₂ вычисляется интегрированием модуля скорости: s = ∫(от t₁ до t₂) v dt. Для равномерного движения s = vt; для равнопеременного движения s = v₀t + at²/2."}, {"num": 4, "title": "Вопрос 4. Тангенциальное и нормальное ускорения.", "answer": "Полное ускорение точки при криволинейном движении можно разложить на две взаимно перпендикулярные составляющие: a = aτ + an.\nТангенциальное (касательное) ускорение aτ = dv/dt направлено по касательной к траектории (вдоль скорости или против неё) и характеризует быстроту изменения модуля скорости.\nНормальное (центростремительное) ускорение an = v²/R направлено по нормали к траектории к центру кривизны и характеризует быстроту изменения направления скорости (R — радиус кривизны траектории в данной точке).\nМодуль полного ускорения a = √(aτ² + an²)."}, {"num": 5, "title": "Вопрос 5. Кинематика вращательного движения твёрдого тела. Угловая скорость и угловое ускорение.", "answer": "При вращении твёрдого тела вокруг неподвижной оси положение тела однозначно задаётся углом поворота φ(t) относительно некоторого начального положения.\nУгловая скорость ω = dφ/dt — псевдовекторная величина, направленная вдоль оси вращения по правилу правого винта (буравчика), характеризующая быстроту изменения угла поворота.\nУгловое ускорение ε = dω/dt = d²φ/dt² — характеризует быстроту изменения угловой скорости; направлено вдоль оси вращения, совпадает с ω при ускоренном вращении и противоположно ей при замедленном."}, {"num": 6, "title": "Вопрос 6. Связь между угловыми и линейными кинематическими величинами.", "answer": "Для точки твёрдого тела, находящейся на расстоянии R от оси вращения (или на расстоянии r от самой оси, заданном радиус-вектором относительно точки на оси), линейная скорость связана с угловой соотношением v = ω × r, по модулю v = ωR.\nТангенциальное ускорение этой точки aτ = εR. Нормальное (центростремительное) ускорение an = ω²R = v²/R. Модуль полного ускорения a = R√(ε² + ω⁴)."}, {"num": 7, "title": "Вопрос 7. Причины изменения скорости тела. Первый закон Ньютона. Инерциальные системы отсчета.", "answer": "Причиной изменения скорости тела является взаимодействие его с другими телами (силы). Первый закон Ньютона (закон инерции): всякое тело сохраняет состояние покоя или равномерного прямолинейного движения до тех пор, пока воздействие со стороны других тел не заставит его изменить это состояние.\nСистемы отсчёта, в которых выполняется закон инерции (то есть свободное от внешних воздействий тело движется равномерно и прямолинейно либо покоится), называются инерциальными. Любая система отсчёта, движущаяся относительно инерциальной равномерно и прямолинейно (без ускорения), также является инерциальной."}, {"num": 8, "title": "Вопрос 8. Масса и импульс. Второй закон Ньютона. Уравнение движения материальной точки в инерциальной системе отсчета.", "answer": "Масса m — скалярная физическая величина, являющаяся мерой инертности тела (мерой его способности сопротивляться изменению скорости при воздействии силы) и одновременно мерой его гравитационных свойств.\nИмпульс (количество движения) частицы p = mv — векторная величина, равная произведению массы на скорость.\nВторой закон Ньютона: скорость изменения импульса тела равна действующей на него силе: dp/dt = F. Для тела постоянной массы это эквивалентно ma = F. Уравнение движения материальной точки в инерциальной системе отсчёта: m·d²r/dt² = F(r, v, t) — дифференциальное уравнение второго порядка, решение которого при заданных начальных условиях полностью определяет движение точки."}, {"num": 9, "title": "Вопрос 9. Принцип относительности Галилея. Преобразования Галилея.", "answer": "Принцип относительности Галилея: все механические явления протекают одинаковым образом во всех инерциальных системах отсчёта, то есть уравнения механики инвариантны (не меняют вида) при переходе от одной инерциальной системы к другой.\nПреобразования Галилея связывают координаты и время события в двух инерциальных системах К и К′, движущихся друг относительно друга со скоростью V вдоль оси x: x′ = x − Vt, y′ = y, z′ = z, t′ = t. Отсюда следует классический закон сложения скоростей v′ = v − V, а ускорение оказывается одинаковым в обеих системах: a′ = a, что и обеспечивает инвариантность уравнений динамики (второго закона Ньютона).\nДинамика системы материальных точек. Законы сохранения"}, {"num": 10, "title": "Вопрос 10. Состояние механической системы. Сохраняющиеся величины. Силы внутренние и внешние. Замкнутая система.", "answer": "Состояние механической системы в данный момент времени определяется совокупностью координат и скоростей (импульсов) всех её точек. Сохраняющаяся величина (интеграл движения) — функция координат и скоростей частиц системы, остающаяся постоянной при движении системы; в механике это импульс, момент импульса и энергия.\nВнутренние силы — силы взаимодействия между частями (точками) самой системы. Внешние силы — силы, действующие на точки системы со стороны тел, не входящих в систему. Замкнутая (изолированная) система — система, на которую внешние силы не действуют, либо их сумма равна нулю; в такой системе тела взаимодействуют только друг с другом."}, {"num": 11, "title": "Вопрос 11. Импульс системы. Законы изменения и сохранения импульса системы.", "answer": "Импульс системы материальных точек — векторная сумма импульсов всех точек: P = Σpᵢ = Σmᵢvᵢ.\nЗакон изменения импульса системы: производная импульса системы по времени равна сумме внешних сил, действующих на систему: dP/dt = ΣFᵢ(внеш); внутренние силы при суммировании взаимно уничтожаются попарно по третьему закону Ньютона и не входят в это уравнение.\nЗакон сохранения импульса: если сумма внешних сил равна нулю (в частности, система замкнута), то импульс системы остаётся постоянным: P = const."}, {"num": 12, "title": "Вопрос 12. Центр масс. Уравнение движения центра масс. Система центра масс.", "answer": "Центр масс (центр инерции) системы материальных точек — точка с радиус-вектором rc = (Σmᵢrᵢ)/m, где m = Σmᵢ — суммарная масса системы.\nСкорость центра масс vc = drc/dt = P/m, где P — импульс системы. Уравнение движения центра масс: m·dvc/dt = ΣFᵢ(внеш) — центр масс системы движется так, как двигалась бы материальная точка массой, равной массе всей системы, под действием суммы всех внешних сил.\nСистема центра масс (Ц-система) — система отсчёта, начало которой совпадает с центром масс системы и которая движется поступательно относительно лабораторной (исходной) системы отсчёта. Суммарный импульс системы частиц в Ц-системе всегда равен нулю."}, {"num": 13, "title": "Вопрос 13. Работа и мощность силы. Кинетическая энергия частицы и закон ее изменения.", "answer": "Элементарная работа силы F на малом перемещении dr: dA = F·dr = F·ds·cosα, где α — угол между силой и перемещением. Работа на участке траектории от точки 1 до точки 2: A₁₂ = ∫F·dr.\nМощность силы N = dA/dt = F·v — работа, совершаемая силой в единицу времени.\nКинетическая энергия частицы T = mv²/2. Теорема об изменении кинетической энергии: изменение кинетической энергии частицы равно работе всех действующих на неё сил: T₂ − T₁ = A₁₂ (или в дифференциальной форме dT = dA)."}, {"num": 14, "title": "Вопрос 14. Понятие силового поля. Консервативные силы. Потенциальная энергия частицы в силовом поле. Связь между потенциальной энергией и силой поля.", "answer": "Силовое поле — область пространства, в каждой точке которой на помещённую туда частицу действует сила, зависящая от положения точки (и, возможно, от времени).\nКонсервативные (потенциальные) силы — силы, работа которых при перемещении частицы не зависит от формы траектории, а определяется только начальным и конечным положениями частицы; эквивалентное условие — работа консервативной силы по любому замкнутому контуру равна нулю: ∮F·dr = 0.\nДля поля консервативных сил вводят потенциальную энергию частицы U(r) так, что работа силы при перемещении из точки 1 в точку 2 равна убыли потенциальной энергии: A₁₂ = U₁ − U₂ = −ΔU.\nСвязь силы и потенциальной энергии: F = −gradU = −∇U — сила направлена в сторону наиболее быстрого убывания потенциальной энергии."}, {"num": 15, "title": "Вопрос 15. Полная механическая энергия частицы в силовом поле. Законы ее изменения и сохранения.", "answer": "Полная механическая энергия частицы E = T + U, где T — кинетическая, U — потенциальная энергия.\nЗакон изменения: изменение полной механической энергии частицы равно работе неконсервативных сил, действующих на неё: dE = δAнеконс.\nЗакон сохранения: если на частицу действуют только консервативные силы (неконсервативные силы отсутствуют или их работа равна нулю), полная механическая энергия частицы сохраняется: E = T + U = const."}, {"num": 16, "title": "Вопрос 16. Механическая энергия системы частиц. Законы изменения и сохранения механической энергии системы.", "answer": "Полная механическая энергия системы частиц E = T + U, где T — суммарная кинетическая энергия всех частиц системы, U — суммарная потенциальная энергия (взаимодействия частиц друг с другом и с внешними полями).\nЗакон изменения: изменение полной механической энергии системы равно сумме работ внешних неконсервативных сил и внутренних неконсервативных (диссипативных, например сил трения) сил: ΔE = Aвнеш(неконс) + Aвнутр(неконс).\nЗакон сохранения: если все силы, действующие на частицы системы (как внутренние, так и внешние), консервативны, то полная механическая энергия системы остаётся постоянной: E = const."}, {"num": 17, "title": "Вопрос 17. Момент импульса частицы и момент силы относительно некоторой точки. Уравнение моментов.", "answer": "Момент импульса частицы относительно точки O: L = r × p = r × mv, где r — радиус-вектор частицы относительно точки O.\nМомент силы относительно точки O: M = r × F.\nУравнение моментов: производная момента импульса частицы относительно неподвижной точки по времени равна моменту силы, действующей на частицу, относительно той же точки: dL/dt = M."}, {"num": 18, "title": "Вопрос 18. Момент импульса системы. Законы изменения и сохранения момента импульса системы.", "answer": "Момент импульса системы материальных точек относительно точки O — векторная сумма моментов импульса всех точек: L = ΣLᵢ = Σ(rᵢ × pᵢ).\nЗакон изменения: производная момента импульса системы относительно неподвижной точки равна суммарному моменту внешних сил относительно той же точки: dL/dt = Mвнеш (моменты внутренних сил взаимно компенсируются вследствие третьего закона Ньютона для центральных сил взаимодействия).\nЗакон сохранения: если суммарный момент внешних сил относительно данной точки равен нулю, момент импульса системы относительно этой точки сохраняется: L = const.\nДинамика твёрдого тела"}, {"num": 19, "title": "Вопрос 19. Число степеней свободы твёрдого тела. Уравнения движения твёрдого тела.", "answer": "Свободное абсолютно твёрдое тело обладает шестью степенями свободы: три из них определяют положение центра масс тела (поступательное движение), а три — ориентацию тела (углы поворота вокруг центра масс, вращательное движение).\nУравнения движения твёрдого тела состоят из двух векторных уравнений: уравнения движения центра масс m·dvc/dt = ΣFᵢ(внеш) и уравнения моментов dL/dt = ΣMᵢ(внеш) (записанного относительно центра масс или неподвижной точки). Эти два уравнения (шесть скалярных проекций) полностью определяют движение твёрдого тела."}, {"num": 20, "title": "Вопрос 20. Момент импульса тела относительно оси.", "answer": "Момент импульса твёрдого тела, вращающегося вокруг неподвижной оси z, относительно этой оси равен Lz = Iz·ω, где Iz — момент инерции тела относительно оси вращения, ω — угловая скорость вращения. Вектор Lz направлен вдоль оси вращения (совпадает по направлению с ω, если ось является осью симметрии распределения масс)."}, {"num": 21, "title": "Вопрос 21. Момент инерции тела относительно оси. Теорема Штейнера.", "answer": "Момент инерции тела относительно оси — величина, являющаяся мерой инертности тела при вращательном движении: для дискретной системы материальных точек I = Σmᵢrᵢ², для сплошного тела I = ∫r²dm, где r — расстояние от элемента массы dm до оси вращения.\nТеорема Штейнера (теорема о параллельных осях): момент инерции тела I относительно произвольной оси равен моменту инерции Ic относительно параллельной ей оси, проходящей через центр масс тела, плюс произведение массы тела на квадрат расстояния d между осями: I = Ic + md²."}, {"num": 22, "title": "Вопрос 22. Уравнение динамики твёрдого тела, вращающегося вокруг неподвижной оси.", "answer": "Основное уравнение динамики вращательного движения твёрдого тела вокруг неподвижной оси: Iz·ε = Mz, где Iz — момент инерции тела относительно оси вращения, ε — угловое ускорение, Mz — суммарный момент внешних сил относительно этой оси. Это уравнение является аналогом второго закона Ньютона для вращательного движения (момент инерции играет роль массы, угловое ускорение — роль линейного, момент силы — роль силы)."}, {"num": 23, "title": "Вопрос 23. Кинетическая энергия вращающегося твёрдого тела. Работа внешних сил при вращении твёрдого тела.", "answer": "Кинетическая энергия твёрдого тела, вращающегося вокруг неподвижной оси с угловой скоростью ω: T = Iz·ω²/2, где Iz — момент инерции относительно оси вращения.\nЭлементарная работа момента внешних сил при повороте тела на угол dφ: dA = Mz·dφ; полная работа A = ∫Mz dφ, а при постоянном моменте A = Mz·φ. Работа внешних сил при вращении тела равна изменению его кинетической энергии вращения: A = ΔT."}, {"num": 24, "title": "Вопрос 24. Кинетическая энергия твердого тела при плоском движении.", "answer": "Плоское движение твёрдого тела можно представить как сумму поступательного движения вместе с центром масс и вращения вокруг оси, проходящей через центр масс перпендикулярно плоскости движения. Кинетическая энергия тела при плоском движении (теорема Кёнига): T = mvc²/2 + Icω²/2, где первое слагаемое — кинетическая энергия поступательного движения центра масс (масса тела m, скорость центра масс vc), второе — кинетическая энергия вращения вокруг центра масс (Ic — момент инерции относительно оси через центр масс, ω — угловая скорость вращения)."}, {"num": 25, "title": "Вопрос 25. Гироскоп. Гироскопический эффект.", "answer": "Гироскоп — массивное симметричное твёрдое тело, быстро вращающееся вокруг своей оси симметрии и обладающее вследствие этого большим моментом импульса L = Iω, направленным вдоль оси вращения.\nЕсли к оси вращающегося гироскопа приложить момент внешней силы M, перпендикулярный вектору L, то ось гироскопа не поворачивается в направлении приложенной силы (как повернулось бы невращающееся тело), а начинает прецессировать — равномерно поворачиваться вокруг направления, перпендикулярного и L, и M, с угловой скоростью прецессии Ω = M/L = M/(Iω). Это явление — отклик оси быстро вращающегося тела на внешний момент силы в виде прецессии, а не прямого наклона — называется гироскопическим эффектом и непосредственно следует из уравнения моментов dL/dt = M.\nМеханические колебания"}, {"num": 26, "title": "Вопрос 26. Общие сведения о колебаниях. Уравнение свободных колебаний под действием квазиупругой силы и его общее решение.", "answer": "Колебания — движения или процессы, обладающие той или иной степенью повторяемости во времени. Квазиупругая сила — сила вида F = −kx, пропорциональная смещению x от положения равновесия и направленная к этому положению (не обязательно упругая по своей физической природе, но имеющая такой же вид зависимости от смещения).\nДинамическое уравнение свободных (собственных) колебаний под действием квазиупругой силы без затухания: m·d²x/dt² = −kx, или в стандартной форме d²x/dt² + ω₀²x = 0, где ω₀ = √(k/m) — собственная циклическая частота колебаний.\nОбщее решение этого уравнения: x(t) = A·cos(ω₀t + φ₀), где A — амплитуда, φ₀ — начальная фаза; обе постоянные определяются начальными условиями (начальным смещением и начальной скоростью)."}, {"num": 27, "title": "Вопрос 27. Гармонический осциллятор. Энергия гармонического осциллятора. Сложение гармонических колебаний.", "answer": "Гармонический осциллятор — система, совершающая гармонические колебания по закону x = A·cos(ωt + φ₀). Скорость v = −Aω·sin(ωt + φ₀), ускорение a = −Aω²·cos(ωt + φ₀) = −ω²x.\nПолная механическая энергия гармонического осциллятора E = T + U = mω²A²/2 = const — при отсутствии затухания сохраняется, периодически переходя из кинетической энергии в потенциальную и обратно.\nСложение одинаково направленных гармонических колебаний одной частоты ω даёт гармоническое колебание той же частоты; его амплитуду и начальную фазу удобно находить методом векторных диаграмм — представляя каждое колебание вектором (фазором) длиной, равной амплитуде, повёрнутым на угол начальной фазы, и складывая эти векторы геометрически: A² = A₁² + A₂² + 2A₁A₂·cos(φ₂ − φ₁)."}, {"num": 28, "title": "Вопрос 28. Физический и математический маятники (малые колебания без затухания).", "answer": "Математический маятник — идеализированная система: материальная точка массой m, подвешенная на невесомой нерастяжимой нити длиной l, совершающая колебания в однородном поле тяжести. Для малых углов отклонения (sinφ ≈ φ) колебания гармонические с периодом T = 2π√(l/g).\nФизический маятник — произвольное твёрдое тело, совершающее под действием силы тяжести колебания вокруг неподвижной горизонтальной оси, не проходящей через центр масс тела. Период малых колебаний физического маятника T = 2π√(I/(mgd)), где I — момент инерции тела относительно оси колебаний, d — расстояние от оси до центра масс тела.\nПриведённая длина физического маятника lприв = I/(md) — длина такого математического маятника, период которого совпадает с периодом данного физического маятника."}, {"num": 29, "title": "Вопрос 29. Затухающие колебания. Динамическое и кинематическое уравнения затухающих колебаний. Коэффициент затухания. Логарифмический декремент затухания.", "answer": "При наличии силы сопротивления, пропорциональной скорости (Fтр = −r·v), динамическое уравнение колебаний принимает вид: m·d²x/dt² + r·dx/dt + kx = 0, или в стандартной форме d²x/dt² + 2β·dx/dt + ω₀²x = 0, где β = r/(2m) — коэффициент затухания, ω₀² = k/m.\nПри слабом затухании (β < ω₀) кинематическое уравнение (решение этого дифференциального уравнения): x(t) = A₀·e^(−βt)·cos(ωt + φ₀), где ω = √(ω₀² − β²) — частота затухающих колебаний, меньшая собственной частоты ω₀. Амплитуда A(t) = A₀·e^(−βt) экспоненциально убывает с течением времени.\nЛогарифмический декремент затухания λ = ln[A(t)/A(t+T)] = βT — натуральный логарифм отношения амплитуд двух последовательных колебаний, разделённых интервалом времени, равным периоду; характеризует относительное уменьшение амплитуды за один период."}, {"num": 30, "title": "Вопрос 30. Вынужденные колебания. Динамическое и кинематическое уравнения вынужденных колебаний.", "answer": "Вынужденные колебания возникают в колебательной системе под действием внешней периодически изменяющейся (вынуждающей) силы F = F₀·cos(Ωt), где Ω — частота вынуждающей силы.\nДинамическое уравнение: m·d²x/dt² + r·dx/dt + kx = F₀·cos(Ωt), или d²x/dt² + 2β·dx/dt + ω₀²x = f₀·cos(Ωt), где f₀ = F₀/m.\nКинематическое уравнение установившихся вынужденных колебаний: x(t) = a·cos(Ωt − ψ), с амплитудой a = f₀ / √[(ω₀² − Ω²)² + 4β²Ω²] и сдвигом фазы (отставанием колебаний от вынуждающей силы) ψ = arctg[2βΩ/(ω₀² − Ω²)]."}, {"num": 31, "title": "Вопрос 31. Явление резонанса. Амплитудно-резонансные кривые.", "answer": "Резонанс — явление резкого возрастания амплитуды вынужденных колебаний при приближении частоты вынуждающей силы Ω к некоторому значению, близкому к собственной частоте системы ω₀.\nРезонансная частота, при которой амплитуда максимальна: Ωрез = √(ω₀² − 2β²). Резонансное значение амплитуды: aрез = f₀ / (2β√(ω₀² − β²)); при слабом затухании (малом β) резонансная амплитуда становится очень большой, а в пределе β → 0 — неограниченно возрастает.\nАмплитудно-резонансные кривые — графики зависимости амплитуды установившихся вынужденных колебаний a от частоты вынуждающей силы Ω при разных значениях коэффициента затухания β: чем меньше коэффициент затухания, тем выше и острее максимум кривой в окрестности резонансной частоты.\nМеханические волны"}, {"num": 32, "title": "Вопрос 32. Основные характеристики свойств упругих сред. Распространение волн в упругой среде. Продольные и поперечные волны.", "answer": "Упругие свойства среды, определяющие распространение в ней механических волн, характеризуются её плотностью ρ и модулями упругости (модуль Юнга E при растяжении-сжатии, модуль сдвига G при сдвиговых деформациях и т. п.). Волна — процесс распространения колебаний (возмущения) в пространстве с течением времени, сопровождающийся переносом энергии без переноса вещества.\nПродольная волна — волна, в которой частицы среды колеблются вдоль направления распространения волны; такие волны могут распространяться в любых средах — твёрдых, жидких и газообразных, так как для их возникновения достаточно упругости объёма (сжатия-растяжения).\nПоперечная волна — волна, в которой частицы среды колеблются перпендикулярно направлению её распространения; поперечные волны могут существовать только в средах, обладающих упругостью формы (упругостью сдвига), то есть, как правило, только в твёрдых телах."}, {"num": 33, "title": "Вопрос 33. Фронт волны и волновая поверхность. Плоские, сферические и цилиндрические волны. Фазовая скорость волны. Длина волны.", "answer": "Волновая поверхность — геометрическое место точек среды, колеблющихся в одинаковой фазе. Фронт волны — частный случай волновой поверхности: граница, до которой к рассматриваемому моменту времени дошло волновое возмущение, отделяющая область среды, уже вовлечённую в колебательный процесс, от ещё невозмущённой области.\nПо форме волновых поверхностей различают плоские волны (волновые поверхности — параллельные плоскости, источник на бесконечности или волна локально плоская), сферические волны (волновые поверхности — концентрические сферы, излучение точечного источника) и цилиндрические волны (волновые поверхности — коаксиальные цилиндры, излучение протяжённого линейного источника).\nФазовая скорость v — скорость перемещения в пространстве данной фазы колебаний (скорость перемещения волновой поверхности). Длина волны λ — расстояние, на которое распространяется волна за время, равное одному периоду колебаний: λ = vT = v/ν, где ν — частота колебаний."}, {"num": 34, "title": "Вопрос 34. Уравнение плоской и сферической волн. Волновое уравнение.", "answer": "Уравнение плоской гармонической волны, распространяющейся вдоль оси x: ξ(x, t) = A·cos(ωt − kx + φ₀), где k = ω/v = 2π/λ — волновое число.\nУравнение сферической волны от точечного источника (с убыванием амплитуды по мере распространения для сохранения потока энергии): ξ(r, t) = (A₀/r)·cos(ωt − kr + φ₀), где r — расстояние от источника.\nВолновое уравнение — дифференциальное уравнение в частных производных, которому удовлетворяет функция, описывающая любую волну: ∂²ξ/∂t² = v²·Δξ, где Δ — оператор Лапласа (для одномерного случая ∂²ξ/∂t² = v²·∂²ξ/∂x²)."}, {"num": 35, "title": "Вопрос 35. Связь скорости плоской волны с характеристиками упругой среды.", "answer": "Скорость распространения упругих волн определяется упругими свойствами и плотностью среды: чем больше модуль упругости и меньше плотность, тем выше скорость волны.\nСкорость продольных волн в тонком твёрдом стержне: v = √(E/ρ), где E — модуль Юнга. Скорость поперечных волн в твёрдом теле: v = √(G/ρ), где G — модуль сдвига. Скорость звука (продольной волны) в газе: v = √(γRT/M) = √(γp/ρ), где γ — показатель адиабаты, R — универсальная газовая постоянная, T — температура, M — молярная масса газа, p — давление."}, {"num": 36, "title": "Вопрос 36. Энергия и плотность энергии упругой волны.", "answer": "Каждый элемент упругой среды, через который проходит волна, обладает кинетической энергией (за счёт колебательного движения частиц) и потенциальной энергией (за счёт упругой деформации); полная механическая энергия волны складывается из энергий всех элементов среды.\nОбъёмная плотность энергии w — энергия волны, заключённая в единице объёма среды. Для плоской гармонической волны её среднее по времени значение: ⟨w⟩ = ρA²ω²/2, где ρ — плотность среды, A — амплитуда колебаний, ω — циклическая частота; плотность энергии пропорциональна плотности среды, квадрату амплитуды и квадрату частоты колебаний."}, {"num": 37, "title": "Вопрос 37. Поток и плотность потока энергии. Вектор Умова.", "answer": "Поток энергии волны Φ через произвольную поверхность — энергия, переносимая волной через эту поверхность в единицу времени.\nПлотность потока энергии (вектор Умова) j = w·v — вектор, равный произведению объёмной плотности энергии волны на вектор её фазовой скорости; направлен в сторону распространения волны. Модуль вектора Умова определяет энергию, переносимую волной за единицу времени через единичную площадку, перпендикулярную направлению распространения.\nСреднее по времени значение модуля вектора Умова называется интенсивностью волны: I = ⟨j⟩ = ⟨w⟩·v = ρA²ω²v/2.\nЭлектростатика: заряд, поле, потенциал"}, {"num": 38, "title": "Вопрос 38. Электрический заряд и его свойства. Закон сохранения электрического заряда. Закон Кулона. Принцип суперпозиции сил.", "answer": "Электрический заряд — физическая величина, характеризующая способность тел к электромагнитному взаимодействию. Существует в двух видах (положительный и отрицательный); заряд квантован — заряд любого тела кратен элементарному заряду e: q = ne.\nЗакон сохранения электрического заряда: алгебраическая сумма зарядов любой электрически замкнутой (изолированной от обмена зарядами с внешними телами) системы остаётся постоянной при любых процессах, происходящих внутри этой системы.\nЗакон Кулона: сила взаимодействия двух неподвижных точечных зарядов в вакууме прямо пропорциональна произведению модулей зарядов и обратно пропорциональна квадрату расстояния между ними: F = k|q₁q₂|/r² (k = 1/4πε₀); сила направлена вдоль прямой, соединяющей заряды, одноимённые заряды отталкиваются, разноимённые — притягиваются.\nПринцип суперпозиции сил: сила, действующая на заряд со стороны системы других зарядов, равна векторной сумме сил, действующих на него со стороны каждого заряда системы по отдельности: F = ΣFᵢ."}, {"num": 39, "title": "Вопрос 39. Электростатическое поле. Вектор напряженности электрического поля. Принцип суперпозиции полей.", "answer": "Электростатическое поле — поле, создаваемое в пространстве неподвижными электрическими зарядами и не изменяющееся со временем.\nНапряжённость электростатического поля E = F/q₀ — силовая векторная характеристика поля, равная силе, действующей со стороны поля на единичный пробный положительный точечный заряд, помещённый в данную точку поля.\nПринцип суперпозиции полей: напряжённость поля, создаваемого системой точечных зарядов в данной точке, равна векторной сумме напряжённостей полей, которые создавал бы в этой точке каждый из зарядов в отдельности: E = ΣEᵢ."}, {"num": 40, "title": "Вопрос 40. Напряженность электростатического поля точечного заряда и системы зарядов. Поток векторного поля через поверхность.", "answer": "Напряжённость поля точечного заряда q на расстоянии r от него: E = kq/r² (направлена радиально от заряда, если q > 0, и к заряду, если q < 0). Для системы точечных зарядов по принципу суперпозиции E = Σ kqᵢrᵢ/rᵢ³ (векторное суммирование вкладов всех зарядов).\nПоток вектора поля через малую площадку dS: dΦ = E·dS = EₙdS = EdS·cosα, где α — угол между вектором E и нормалью к площадке. Поток через произвольную (не обязательно замкнутую) поверхность: Φ = ∫E·dS — интеграл по этой поверхности."}, {"num": 41, "title": "Вопрос 41. Теорема Гаусса для поля вектора E в вакууме в интегральной и дифференциальной формах.", "answer": "Интегральная форма теоремы Гаусса: поток вектора напряжённости электростатического поля через произвольную замкнутую поверхность равен алгебраической сумме зарядов, заключённых внутри этой поверхности, делённой на электрическую постоянную ε₀: ∮E·dS = Σqᵢ(внутр)/ε₀ = Q/ε₀.\nДифференциальная форма (получается из интегральной с помощью теоремы Остроградского–Гаусса о связи потока и дивергенции): divE = ρ/ε₀, где ρ — объёмная плотность электрического заряда в данной точке."}, {"num": 42, "title": "Вопрос 42. Потенциал электростатического поля точечного заряда и системы зарядов. Связь потенциала и напряженности электростатического поля.", "answer": "Потенциал электростатического поля φ = Wp/q₀ — скалярная энергетическая характеристика поля, равная потенциальной энергии единичного положительного точечного заряда, помещённого в данную точку поля (при условии, что потенциал на бесконечности принят равным нулю).\nПотенциал поля точечного заряда q на расстоянии r: φ = kq/r. Потенциал поля системы зарядов равен алгебраической (скалярной) сумме потенциалов полей, создаваемых каждым зарядом по отдельности: φ = Σkqᵢ/rᵢ.\nСвязь потенциала и напряжённости: E = −gradφ = −∇φ — вектор напряжённости направлен в сторону наиболее быстрого убывания потенциала. Обратная связь: разность потенциалов между двумя точками равна φ₁ − φ₂ = ∫(от 1 до 2) E·dl."}, {"num": 43, "title": "Вопрос 43. Циркуляция вектора E и потенциал поля. Теорема о циркуляции вектора E в интегральной и дифференциальной формах.", "answer": "Циркуляция вектора напряжённости электрического поля по замкнутому контуру L — интеграл ∮E·dl, взятый вдоль этого контура.\nТеорема о циркуляции (интегральная форма): циркуляция вектора напряжённости электростатического поля по любому замкнутому контуру равна нулю: ∮E·dl = 0. Это выражает потенциальный (консервативный) характер электростатического поля — работа сил поля при перемещении заряда по любому замкнутому пути равна нулю, что и позволяет ввести однозначный потенциал.\nДифференциальная форма теоремы о циркуляции: rotE = 0 — ротор (вихрь) вектора напряжённости электростатического поля равен нулю в любой точке пространства."}, {"num": 44, "title": "Вопрос 44. Электрическое поле диполя в дальней зоне.", "answer": "Электрический диполь — система двух равных по модулю и противоположных по знаку точечных зарядов +q и −q, расположенных на небольшом расстоянии l друг от друга. Дипольный (электрический) момент p = ql, направленный от отрицательного заряда к положительному.\nВ дальней зоне, на расстоянии r от диполя, много большем l, потенциал поля диполя в точке, видимой под углом θ к оси диполя: φ = kp·cosθ/r² — убывает с расстоянием быстрее, чем потенциал точечного заряда (как 1/r² вместо 1/r).\nНапряжённость поля диполя на продолжении его оси: Eось = 2kp/r³; на перпендикуляре к оси, проведённом через середину диполя (на экваторе): Eэкв = kp/r³ — то есть напряжённость убывает с расстоянием как 1/r³."}, {"num": 45, "title": "Вопрос 45. Момент сил, действующих на диполь в электрическом поле. Потенциальная энергия диполя в электростатическом поле.", "answer": "В однородном внешнем электрическом поле E на электрический диполь с моментом p действует момент сил M = p × E, по модулю M = pE·sinα, где α — угол между вектором дипольного момента и вектором напряжённости поля. Этот момент сил стремится повернуть диполь так, чтобы его дипольный момент совпал по направлению с напряжённостью внешнего поля.\nПотенциальная энергия диполя в электростатическом поле: Wp = −p·E = −pE·cosα; минимальна (устойчивое положение равновесия) при p, сонаправленном с E (α = 0), и максимальна при противоположной ориентации.\nДиэлектрики"}, {"num": 46, "title": "Вопрос 46. Связанные и сторонние заряды. Полярные и неполярные молекулы. Явление поляризации диэлектрика и его механизмы.", "answer": "Сторонние заряды — заряды, не входящие в состав молекул диэлектрика (например, свободные заряды на проводниках, ионы примесей), создающие в пространстве внешнее по отношению к диэлектрику поле. Связанные заряды — заряды, входящие в состав электрически нейтральных молекул самого диэлектрика и способные лишь смещаться в пределах молекулы под действием внешнего поля.\nПолярные молекулы обладают отличным от нуля собственным дипольным моментом даже в отсутствие внешнего поля (вследствие несимметричного распределения зарядов в молекуле). Неполярные молекулы в отсутствие поля дипольного момента не имеют (распределение заряда симметрично).\nПоляризация диэлектрика — явление приобретения диэлектриком ненулевого суммарного (наведённого) дипольного момента под действием внешнего электрического поля. Механизмы поляризации: электронная (деформационная) поляризация неполярных молекул за счёт смещения электронных оболочек относительно ядер; ориентационная поляризация полярных молекул за счёт поворота (ориентации) их собственных дипольных моментов по полю; ионная поляризация — смещение разноимённо заряженных ионов кристаллической решётки относительно друг друга."}, {"num": 47, "title": "Вопрос 47. Вектор поляризации. Электрическое поле внутри изотропного диэлектрика.", "answer": "Вектор поляризации P — дипольный момент единицы объёма диэлектрика: P = Σpᵢ/ΔV (сумма дипольных моментов молекул в малом объёме ΔV, делённая на этот объём). Для линейного изотропного диэлектрика вектор поляризации пропорционален напряжённости поля внутри диэлектрика: P = ε₀χE, где χ — диэлектрическая восприимчивость.\nСвязанные заряды, возникающие при поляризации, создают собственное электрическое поле, направленное навстречу внешнему (поляризующему) полю. В результате результирующее (суммарное) поле внутри однородного изотропного диэлектрика ослабляется по сравнению с полем в вакууме: Eвнутр = E₀/ε, где ε — диэлектрическая проницаемость диэлектрика."}, {"num": 48, "title": "Вопрос 48. Диэлектрическая восприимчивость. Теорема Гаусса для поля вектора P.", "answer": "Диэлектрическая восприимчивость χ — безразмерный коэффициент пропорциональности между вектором поляризации диэлектрика и напряжённостью электрического поля внутри него: P = ε₀χE. Диэлектрическая восприимчивость связана с диэлектрической проницаемостью соотношением χ = ε − 1.\nТеорема Гаусса для вектора поляризации: поток вектора P через произвольную замкнутую поверхность равен взятому с обратным знаком суммарному связанному заряду, заключённому внутри этой поверхности: ∮P·dS = −qсвяз(внутр)."}, {"num": 49, "title": "Вопрос 49. Вектор электрического смещения D. Теорема Гаусса для поля вектора электрического смещения. Диэлектрическая проницаемость.", "answer": "Вектор электрического смещения (электрической индукции) D = ε₀E + P = εε₀E — вспомогательная векторная характеристика поля в веществе, поток которой через замкнутую поверхность определяется только сторонними зарядами, заключёнными внутри неё, и не зависит от наличия диэлектрика.\nТеорема Гаусса для вектора D: в интегральной форме ∮D·dS = Qстор(внутр) — поток вектора D через произвольную замкнутую поверхность равен суммарному сторонннему заряду внутри этой поверхности; в дифференциальной форме divD = ρстор.\nДиэлектрическая проницаемость ε = 1 + χ — безразмерная величина, показывающая, во сколько раз напряжённость поля в диэлектрике меньше, чем в вакууме при тех же сторонних зарядах."}, {"num": 50, "title": "Вопрос 50. Условия на границе раздела двух диэлектриков для векторов E и D.", "answer": "На границе раздела двух однородных диэлектриков (в отсутствие на границе сторонних поверхностных зарядов) выполняются следующие граничные условия: нормальная составляющая вектора электрического смещения непрерывна при переходе через границу: D₁ₙ = D₂ₙ (что равносильно ε₁E₁ₙ = ε₂E₂ₙ); тангенциальная (касательная к границе) составляющая вектора напряжённости непрерывна: E₁τ = E₂τ (это следствие потенциальности электростатического поля, теоремы о циркуляции).\nИз этих условий следует, что на границе раздела двух диэлектриков с различными ε линии вектора E (и линии D) испытывают излом (преломление), аналогичное преломлению световых лучей."}, {"num": 51, "title": "Вопрос 51. Сегнетоэлектрики и их доменная структура. Нелинейный характер поляризации сегнетоэлектрика.", "answer": "Сегнетоэлектрики — диэлектрики, обладающие в определённом интервале температур (ниже точки Кюри) спонтанной (самопроизвольной) поляризацией, то есть отличным от нуля дипольным моментом единицы объёма в отсутствие внешнего электрического поля.\nДоменная структура: кристалл сегнетоэлектрика самопроизвольно разбивается на домены — макроскопические области, в каждой из которых вектор спонтанной поляризации однороден, но направления поляризации в разных доменах различны; вследствие этого суммарный дипольный момент образца в целом, как правило, близок к нулю, если внешнее поле не приложено.\nНелинейный характер поляризации: для сегнетоэлектриков зависимость поляризации (и электрического смещения) от напряжённости внешнего поля P(E) — нелинейная и неоднозначная функция; диэлектрическая проницаемость сегнетоэлектрика сама существенно зависит от напряжённости приложенного поля и может достигать очень больших значений."}, {"num": 52, "title": "Вопрос 52. Диэлектрический гистерезис.", "answer": "Диэлектрический гистерезис — явление, состоящее в том, что поляризация (или электрическое смещение) сегнетоэлектрика при изменении внешнего поля изменяется с отставанием, в результате чего зависимость P(E) (или D(E)) оказывается неоднозначной: при увеличении и при последующем уменьшении поля поляризация проходит по разным кривым, образующим на графике замкнутую петлю гистерезиса.\nПри полном снятии внешнего поля (E = 0) в сегнетоэлектрике сохраняется остаточная поляризация Pост; для того чтобы полностью деполяризовать образец, необходимо приложить обратное (противоположно направленное) поле определённой величины — коэрцитивную силу Eс.\nПроводники в электростатическом поле"}, {"num": 53, "title": "Вопрос 53. Проводники в электростатическом поле. Электростатическая индукция. Напряженность и потенциал электростатического поля в проводнике и вблизи его поверхности.", "answer": "В состоянии электростатического равновесия напряжённость электрического поля внутри проводника всюду равна нулю (E = 0), поскольку иначе свободные заряды продолжали бы перемещаться. Из этого следует, что весь объём проводника, находящегося в равновесии, эквипотенциален (потенциал одинаков во всех его точках), а поверхность проводника является эквипотенциальной поверхностью; вектор напряжённости поля вблизи поверхности проводника направлен по нормали к ней (иначе тангенциальная составляющая вызвала бы перемещение зарядов вдоль поверхности).\nЭлектростатическая индукция — явление перераспределения (разделения) свободных зарядов в проводнике, внесённом во внешнее электрическое поле, в результате которого на поверхности проводника возникают индуцированные (наведённые) заряды; их собственное поле компенсирует внешнее поле во всём объёме проводника, обеспечивая равенство E = 0 внутри него."}, {"num": 54, "title": "Вопрос 54. Условия стационарного распределения заряда в проводнике.", "answer": "В состоянии равновесия весь избыточный заряд проводника распределяется исключительно по его поверхности: поскольку внутри проводника E = 0, то по теореме Гаусса в дифференциальной форме (divE = ρ/ε₀) объёмная плотность заряда внутри проводника равна нулю (ρ = 0).\nПоверхность заряженного проводника представляет собой эквипотенциальную поверхность. Напряжённость поля непосредственно у поверхности проводника направлена по нормали к ней и связана с поверхностной плотностью заряда σ соотношением Eₙ = σ/ε₀ (для проводника в вакууме)."}, {"num": 55, "title": "Вопрос 55. Электроемкость уединенного проводника. Энергия электрического поля и ее объемная плотность.", "answer": "Электроёмкость уединённого проводника C = q/φ — физическая величина, равная отношению заряда проводника к его потенциалу (при условии, что потенциал бесконечно удалённой точки принят равным нулю); характеризует способность проводника накапливать электрический заряд при данном потенциале.\nЭнергия заряженного проводника (энергия его электрического поля): W = qφ/2 = q²/(2C) = Cφ²/2.\nОбъёмная плотность энергии электрического поля (энергия единицы объёма поля): w = ε₀εE²/2 = ED/2 — пропорциональна квадрату напряжённости поля в данной точке.\nЭлектрический ток"}, {"num": 56, "title": "Вопрос 56. Плотность и сила тока. Основы теории Друде для классической электропроводности металлов.", "answer": "Сила тока I = dq/dt — заряд, протекающий через поперечное сечение проводника в единицу времени. Плотность тока j — вектор, модуль которого равен силе тока, протекающего через единичную площадку, перпендикулярную направлению движения зарядов; в общем виде j = qnv, где n — концентрация носителей заряда, q — заряд одного носителя, v — средняя скорость направленного (дрейфового) движения носителей.\nКлассическая теория электропроводности металлов (теория Друде) рассматривает свободные электроны металла как классический электронный газ. Между столкновениями с ионами кристаллической решётки электроны движутся хаотически (тепловое движение) и одновременно ускоряются электрическим полем, приобретая дополнительную упорядоченную (дрейфовую) скорость, в среднем пропорциональную напряжённости поля. Это приводит к закону Ома и позволяет выразить удельную электропроводность через микроскопические параметры: σ = ne²τ/m, где n — концентрация электронов, e — заряд электрона, τ — среднее время свободного пробега между столкновениями, m — масса электрона."}, {"num": 57, "title": "Вопрос 57. Уравнение непрерывности как выражение закона сохранения заряда в дифференциальной форме. Условие стационарности электрического тока.", "answer": "Уравнение непрерывности — дифференциальная форма закона сохранения электрического заряда: divj = −∂ρ/∂t — дивергенция плотности тока в данной точке равна скорости убывания объёмной плотности заряда в этой точке (заряд, вытекающий из малого объёма за счёт тока, уменьшает заряд внутри этого объёма).\nДля стационарного (постоянного во времени) тока распределение заряда не изменяется со временем (∂ρ/∂t = 0), поэтому условие стационарности тока имеет вид: divj = 0 — линии тока в этом случае не имеют ни начала, ни конца (замкнуты сами на себя), а поток вектора плотности тока через любую замкнутую поверхность равен нулю."}, {"num": 58, "title": "Вопрос 58. Закон Ома в интегральной и локальной (дифференциальной) форме.", "answer": "Закон Ома в интегральной форме для участка цепи без ЭДС: I = U/R = (φ₁ − φ₂)/R, где U — напряжение на участке, R — его сопротивление; для полной цепи с источником ЭДС ε и внутренним сопротивлением r: I = ε/(R + r).\nЗакон Ома в локальной (дифференциальной) форме: j = σE — плотность тока в данной точке проводника прямо пропорциональна напряжённости электрического поля в этой же точке, где σ — удельная электропроводность вещества (величина, обратная удельному сопротивлению ρуд: σ = 1/ρуд)."}, {"num": 59, "title": "Вопрос 59. Закон Джоуля-Ленца в локальной (дифференциальной) форме.", "answer": "Закон Джоуля–Ленца в интегральной форме: при прохождении постоянного тока I через проводник сопротивлением R в течение времени t в нём выделяется количество теплоты Q = I²Rt.\nЛокальная (дифференциальная) форма закона описывает удельную тепловую мощность — мощность, выделяющуюся в единице объёма проводника в данной точке: w = dQ/(dV·dt) = j·E = σE² = j²/σ, где j — плотность тока, E — напряжённость поля, σ — удельная электропроводность в этой точке. Выделение тепла пропорционально квадрату плотности тока (или напряжённости поля).\nЭлементы статистической физики и термодинамики"}, {"num": 60, "title": "Вопрос 60. Термодинамический и статический методы исследования. Понятие функции распределения (плотности вероятности) случайной величины.", "answer": "Термодинамический метод исследования макроскопических систем основан на нескольких опытных постулатах (началах термодинамики) и описывает систему с помощью макроскопических параметров (давление, объём, температура и др.) без обращения к её молекулярному строению.\nСтатистический метод, напротив, исходит из представлений о молекулярном строении вещества и описывает огромный коллектив частиц с помощью методов теории вероятностей, получая макроскопические закономерности как результат усреднения случайного поведения отдельных молекул.\nФункция распределения (плотность вероятности) f(x) случайной величины X — функция, такая, что произведение f(x)dx равно вероятности того, что случайная величина X примет значение, лежащее в малом интервале (x, x + dx). Функция распределения удовлетворяет условию нормировки: интеграл от f(x) по всей области возможных значений x равен единице (поскольку величина X обязательно примет какое-либо значение из этой области)."}, {"num": 61, "title": "Вопрос 61. Распределение молекул идеального газа по абсолютным значениям скорости (распределение Максвелла).", "answer": "Распределение Максвелла описывает, какая доля молекул идеального газа, находящегося в состоянии теплового равновесия при температуре T, имеет скорость (по модулю), лежащую в интервале от v до v + dv: dN/N = f(v)dv, где функция распределения по модулям скорости имеет вид f(v) = 4π(m/2πkT)^(3/2)·v²·exp(−mv²/(2kT)), m — масса молекулы, k — постоянная Больцмана.\nЭта функция обращается в нуль при v = 0 и при v → ∞, имеет максимум при некотором значении скорости (наиболее вероятной скорости) и зависит от массы молекул газа и температуры: с ростом температуры максимум смещается в сторону больших скоростей, а кривая становится более плоской."}, {"num": 62, "title": "Вопрос 62. Средняя, среднеквадратичная и наиболее вероятная скорости молекул.", "answer": "Наиболее вероятная скорость vв — скорость, соответствующая максимуму функции распределения Максвелла: vв = √(2kT/m) = √(2RT/M).\nСредняя скорость (среднее арифметическое значение модуля скорости по всем молекулам) ⟨v⟩ = √(8kT/(πm)) = √(8RT/(πM)).\nСреднеквадратичная скорость vкв = √⟨v²⟩ = √(3kT/m) = √(3RT/M) — корень из среднего значения квадрата скорости, непосредственно связанный со средней кинетической энергией молекул.\nЭти три характерные скорости соотносятся как vв : ⟨v⟩ : vкв = √2 : √(8/π) : √3, то есть vв < ⟨v⟩ < vкв при любой температуре."}, {"num": 63, "title": "Вопрос 63. Распределение молекул идеального газа по координатам во внешнем поле (распределение Больцмана).", "answer": "Распределение Больцмана описывает распределение молекул идеального газа, находящегося в состоянии термодинамического равновесия во внешнем потенциальном силовом поле, по координатам (точнее — по значениям потенциальной энергии U(r) в каждой точке поля): n(r) = n₀·exp[−U(r)/(kT)], где n₀ — концентрация молекул в точке, где потенциальная энергия принята равной нулю.\nЧастный, но важнейший случай — поле силы тяжести, для которого получается барометрическая формула: концентрация молекул n = n₀·exp(−mgh/(kT)) и, соответственно, давление газа p = p₀·exp(−mgh/(kT)), где h — высота над выбранным нулевым уровнем."}, {"num": 64, "title": "Вопрос 64. Распределение Максвелла-Больцмана.", "answer": "Распределение Максвелла–Больцмана — обобщённое (объединённое) распределение, описывающее одновременно как распределение молекул газа по скоростям (распределение Максвелла, связанное с кинетической энергией молекул), так и их распределение по координатам во внешнем потенциальном поле (распределение Больцмана, связанное с потенциальной энергией): dN = n₀(m/2πkT)^(3/2)·exp[−(mv²/2 + U(r))/(kT)]·dV·dvₓdv_ydv_z.\nЭта формула даёт число молекул dN, координаты которых лежат в малом объёме dV около точки с радиус-вектором r, а компоненты скорости — в малых интервалах dvₓ, dv_y, dv_z около заданных значений vₓ, v_y, v_z. Показатель экспоненты пропорционален взятой с обратным знаком полной энергии молекулы E = mv²/2 + U(r) (кинетической плюс потенциальной), делённой на kT, что отражает общий принцип статистической физики: вероятность состояния экспоненциально убывает с ростом его энергии."}, {"num": 65, "title": "Вопрос 65. Обратимые и необратимые процессы. Второй закон термодинамики.", "answer": "Обратимый процесс — идеализированный процесс, который может быть проведён в противоположном направлении так, что система проходит через в точности те же промежуточные (равновесные) состояния, что и при прямом протекании процесса, причём после возврата системы в исходное состояние в окружающих телах не остаётся никаких изменений. Реализуется только как бесконечно медленная последовательность равновесных состояний.\nНеобратимый процесс — процесс, который самопроизвольно способен протекать только в одном определённом направлении (любые реальные процессы, сопровождающиеся трением, теплопередачей при конечной разности температур, диффузией, и т. п.).\nВторой закон термодинамики имеет несколько равносильных формулировок: невозможен круговой процесс, единственным результатом которого было бы превращение всей теплоты, полученной от одного теплового резервуара, в работу (формулировка Кельвина); теплота не может самопроизвольно (без компенсации) переходить от менее нагретого тела к более нагретому (формулировка Клаузиуса); в замкнутой системе при необратимых процессах энтропия возрастает, при обратимых процессах остаётся неизменной (формулировка через энтропию: dS ≥ 0)."}, {"num": 66, "title": "Вопрос 66. Энтропия системы. Закон возрастания энтропии.", "answer": "Энтропия S — функция состояния термодинамической системы, изменение которой при переходе системы из одного состояния в другое вдоль обратимого пути равно сумме приведённых количеств теплоты, полученных системой на этом пути: dS = δQ/T (для обратимого процесса), а для конечного перехода ΔS = ∫δQобр/T.\nЗакон возрастания энтропии: энтропия замкнутой (изолированной от внешних воздействий) системы при любых самопроизвольно протекающих в ней процессах не убывает: dS ≥ 0, причём знак равенства dS = 0 достигается только для обратимых процессов, а dS > 0 — для необратимых процессов. Этот закон представляет собой одну из формулировок второго закона термодинамики."}, {"num": 67, "title": "Вопрос 67. Статистический вес макросостояния. Статистический смысл энтропии.", "answer": "Статистический вес (термодинамическая вероятность) макроскопического состояния системы Ω — число различных микроскопических состояний (микросостояний) системы, посредством которых может быть реализовано данное макроскопическое состояние.\nСтатистический смысл энтропии раскрывается формулой Больцмана: S = k·lnΩ, где k — постоянная Больцмана; энтропия системы пропорциональна натуральному логарифму статистического веса её состояния.\nС этой точки зрения возрастание энтропии замкнутой системы при необратимых процессах соответствует её самопроизвольному переходу от менее вероятных макросостояний (с малым числом реализующих их микросостояний) к более вероятным макросостояниям (с большим статистическим весом), а состояние термодинамического равновесия — это макросостояние с максимально возможным статистическим весом."}], "tasks": [{"num": 1, "desc": "Ускорение материальной точки изменяется со временем по закону, где A = 2 м/с4 ; B =1 м/с2 . Найти кинематический закон движения точки, а также модуль ее перемещения за времягде t1=1с, если в момент t0 =0и", "solution": "Дано: a = A·t·i + B·j, A = 2 м/с⁴, B = 1 м/с², t₁ = 1 с, r₀ = 0, v₀ = 0.\n\nРешение:\n1) Находим скорость интегрированием:\nv = ∫a·dt = ∫(A·t·i + B·j)·dt = (A·t²/2)·i + (B·t)·j\nv(t) = t²·i + t·j (м/с)\n\n2) Находим радиус-вектор:\nr = ∫v·dt = (A·t³/6)·i + (B·t²/2)·j\nr(t) = (t³/3)·i + (t²/2)·j (м)\n\n3) Перемещение за t₁ = 1 с:\nΔr = r(1) − r₀ = (⅓)·i + (½)·j\n|Δr| = √((⅓)² + (½)²) = √(13/36) = √13/6 ≈ 0,601 м\n\nОтвет: r(t) = (t³/3)·i + (t²/2)·j, |Δr| = √13/6 ≈ 0,601 м"}, {"num": 2, "desc": "Точка движется, замедляясь, по прямой с ускорением, модуль которого зависит от ее скорости v по закону, где α − положительная постоянная. В начальный момент времени скорость точки равна v0 . Какой путь пройдет точка до остановки? За какое время этот путь будет пройден?", "solution": "Дано: a = α√v, α > 0, v(0) = v₀.\n\nРешение:\n1) dv/dt = −α√v. Разделяем переменные: dv/√v = −α·dt\nИнтегрируем: 2√v = −α·t + C\nИз v(0) = v₀: C = 2√v₀\n√v = √v₀ − α·t/2\n\n2) Время до остановки: t_ост = 2√v₀/α\n\n3) Путь: ds = −(√v/α)·dv\ns = ∫₀^s ds = ∫_{v₀}⁰ (−√v/α)·dv = (1/α)·∫₀^{v₀} √v·dv = 2v₀√v₀/(3α)\n\nОтвет: s = 2v₀√v₀/(3α), t = 2√v₀/α"}, {"num": 3, "desc": "Воздушный шар начинает подниматься с поверхности земли. Скорость его подъема постоянна и равна v0 . Благодаря ветру шар приобретает горизонтальную составляющую скорости vx =αy, где α − положительная постоянная, y - высота подъема. Найти зависимость от высоты подъема: а) величины сноса шара x(y) ; б) тангенциального, нормального и полного ускорений шара.", "solution": "Дано: v_подъёма = v₀, v_x = α·y.\n\nРешение:\n1) y = v₀·t, t = y/v₀\nv_x = α·y = α·v₀·t\nx = ∫v_x·dt = α·v₀·t²/2 = α·y²/(2v₀)\n\n2) a_x = α·v₀, a_y = 0, a = α·v₀\nv = √(v_x² + v_y²) = v₀·√(1 + α²·t²)\na_τ = dv/dt = α²·v₀·t/√(1 + α²·t²)\na_n = √(a² − a_τ²) = α·v₀/√(1 + α²·t²)\n\nОтвет: x(y) = α·y²/(2v₀); a = α·v₀;\na_τ = α²·y/√(1 + (α·y/v₀)²); a_n = α·v₀/√(1 + (α·y/v₀)²)"}, {"num": 4, "desc": "Точка движется по окружности со скоростьюгде A = 0,5 м/с2 .Найти ее полное ускорение в момент, когда она пройдет η = 0,1 длины окружности после начала движения.", "solution": "Дано: v = A√t, A = 0,5 м/с², η = 0,1 длины окружности.\n\nРешение:\n1) s = η·2πR = 0,2πR. s = ∫v·dt = 2A·t^{3/2}/3\n2) t = (3s/(2A))^{2/3} = (0,3πR/A)^{2/3}\n3) a_τ = dv/dt = A/(2√t)\na_n = v²/R = A²·t/R\n4) a = √(a_τ² + a_n²) = √(A²/(4t) + A⁴·t²/R²)\nПри s = 0,2πR: t = (0,3πR/A)^{2/3}\n\nОтвет: a = √(A²/(4t) + A⁴·t²/R²) при t = (0,3πR/A)^{2/3}"}, {"num": 5, "desc": "Точка движется в плоскости XY по законугде A и ω – положительные постоянные. Найти: 1) скорость и ускорение точки в зависимости от времени; 2) путь s , проходимый точкой за время τ . Угол между скоростью и ускорением точки.", "solution": "Дано: x = A·sin(ωt), y = A·cos(ωt).\n\nРешение:\n1) v_x = A·ω·cos(ωt), v_y = −A·ω·sin(ωt)\nv = √(v_x² + v_y²) = A·ω = const\n\n2) a_x = −A·ω²·sin(ωt), a_y = −A·ω²·cos(ωt)\na = A·ω² = const\n\n3) v·a = 0 ⇒ угол между v и a = 90°\n\n4) s = v·τ = A·ω·τ\n\n5) Траектория: x² + y² = A² — окружность\n\nОтвет: v = A·ω, a = A·ω², ∠(v,a) = 90°, s = A·ω·τ"}, {"num": 6, "desc": "Пуля, пробив доску толщиной h , изменила свою скорость от v0 до v. Найти время движения пули в доске, считая силу сопротивления пропорциональной квадрату скорости.", "solution": "Дано: h, v₀, v, F_сопр = −k·v².\n\nРешение:\n1) m·dv/dt = −k·v² → dv/v² = −(k/m)·dt\n1/v = (k/m)·t + 1/v₀\n\n2) s = ∫v·dt = (m/k)·ln(1 + k·v₀·t/m)\n\n3) При s = h: h = (m/k)·ln(v₀/v)\nk·h/m = ln(v₀/v) → v = v₀·e^{−kh/m}\n\n4) t = (m/k)·(1/v − 1/v₀)\n\nОтвет: t = (m/k)·(1/v − 1/v₀)"}, {"num": 7, "desc": "Найти модуль и вектор силы, действующей на частицу массой m, при ее движении в плоскости ХУ по законугде A, B, ω – постоянные.", "solution": "Дано: m, x = A·cos(ωt), y = B·sin(ωt).\n\nРешение:\n1) v_x = −A·ω·sin(ωt), v_y = B·ω·cos(ωt)\na_x = −A·ω²·cos(ωt), a_y = −B·ω²·sin(ωt)\na = −ω²·(A·cos(ωt)·i + B·sin(ωt)·j) = −ω²·r\n\n2) F = m·a = −m·ω²·r\n|F| = m·ω²·√(A²·cos²(ωt) + B²·sin²(ωt))\n\nОтвет: F = −m·ω²·r, |F| = m·ω²·√(A²·cos²(ωt) + B²·sin²(ωt))"}, {"num": 8, "desc": "Катер массой m движется по озеру со скоростью v0 . В момент t = 0 выключили его двигатель. Считая силу сопротивления пропорциональной скорости катера, Fc = −kv, k = const > 0, найти: 1) время движения катера с выключенным двигателем; 2) скорость катера в зависимости от пути, пройденного с выключенным двигателем; 3) полный путь до остановки.", "solution": "Дано: m, v₀, F_c = −k·v.\n\nРешение:\n1) m·dv/dt = −k·v → dv/v = −(k/m)·dt\nv(t) = v₀·e^{−(k/m)·t}\n\n2) m·v·dv/ds = −k·v → m·dv/ds = −k\nv(s) = v₀ − (k/m)·s\n\n3) s_полн = m·v₀/k (при v = 0)\n\nОтвет: 1) v(t) = v₀·e^{−kt/m}; 2) v(s) = v₀ − (k/m)·s; 3) s_полн = m·v₀/k"}, {"num": 9, "desc": "Найти момент инерции тонкого однородного стержня относительно оси, перпендикулярной к стержню и проходящей через его конец, если масса стержня m и его длина l . Найти момент инерции стержня, относительно оси, перпендикулярной стержню и проходящей через его середину.", "solution": "Дано: стержень m, l.\n\nРешение:\n1) Ось через конец: dI = x²·(m/l)·dx\nI_к = ∫₀^l (m/l)·x²·dx = m·l²/3\n\n2) Ось через середину (теорема Штейнера):\nI_с = I_к − m·(l/2)² = m·l²/3 − m·l²/4 = m·l²/12\n\nОтвет: I_конец = m·l²/3, I_середина = m·l²/12"}, {"num": 10, "desc": "На однородный сплошной цилиндр массой M и радиусом R плотно намотана легкая нерастяжимая нить, к концу которой прикреплен груз массой m . В момент t = 0 система пришла в движение. Пренебрегая трением в оси цилиндра, найти зависимость от времени: 1) модуля угловой скорости цилиндра; 2) кинетическую энергию системы груз – цилиндр.", "solution": "Дано: цилиндр M, R; груз m.\n\nРешение:\n1) mg − T = ma; T·R = I·ε; I = MR²/2; a = ε·R\n2) T = M·a/2 → mg − M·a/2 = ma\na = 2mg/(2m + M)\n\n3) ω = ε·t = a·t/R = 2mg·t/[R(2m+M)]\n\n4) E_к = mv²/2 + Iω²/2 = m²g²t²/(2m+M)\n\nОтвет: ω(t) = 2mg·t/[R(2m+M)]; E_к(t) = m²g²t²/(2m+M)"}, {"num": 11, "desc": "В системе известны массы тел m1 и m2 , коэффициент трения k между телом m1 и горизонтальной плоскостью, а также масса блока m, который можно считать однородным диском. Скольжения нити по блоку нет. В момент t = 0 тело m2 начинает опускаться. Пренебрегая массой нити и трением в оси блока, найти: а) ускорение тела m2 ; б) работу силы трения, действующую на тело m1, за первые t секунд после начала движения.", "solution": "Дано: m₁, m₂, k, m (диск), t.\n\nРешение:\n1) T₁ − km₁g = m₁a; m₂g − T₂ = m₂a; (T₂−T₁)R = I·ε = (mR²/2)·(a/R)\n2) T₂ − T₁ = ma/2\n3) a = (m₂ − km₁)·g/(m₁ + m₂ + m/2)\n4) A_тр = −km₁g·s = −km₁g·at²/2 = −km₁(m₂−km₁)·g²·t²/[2(m₁+m₂+m/2)]\n\nОтвет: a = (m₂−km₁)·g/(m₁+m₂+m/2); A_тр = −km₁(m₂−km₁)·g²·t²/[2(m₁+m₂+m/2)]"}, {"num": 12, "desc": "На гладкой наклонной плоскости, составляющей угол α с горизонтальной поверхностью, находится катушка с ниткой, свободный конец которой укреплен, как показано на рисунке. Масса катушки m , ее момент инерции относительно собственной оси I , радиус намотанного слоя ниток r . Найти ускоре
